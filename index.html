<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REINO DAS CINZAS - Teste Mínimo</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; width:100vw; height:100vh; overflow:hidden; }
        #game-container { width:100%; height:100%; max-width:900px; max-height:1600px; aspect-ratio:9/16; border:2px solid #c9a84c; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <!-- Carrega o Phaser de uma CDN alternativa, caso a outra esteja bloqueada -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script>
        // Verifica se o Phaser foi carregado
        if (typeof Phaser === 'undefined') {
            document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:50px;">ERRO: Phaser não carregou.</h1>';
        } else {
            // Configuração ultra simples
            const config = {
                type: Phaser.AUTO,
                parent: 'game-container',
                width: 480,
                height: 800,
                backgroundColor: '#1a1a2e',
                scene: {
                    create: function() {
                        // Apenas um texto centralizado
                        this.add.text(240, 400, 'Phaser funcionando!\nReino das Cinzas', {
                            fontSize: '24px',
                            color: '#c9a84c',
                            align: 'center',
                            stroke: '#000',
                            strokeThickness: 4
                        }).setOrigin(0.5);
                    }
                }
            };
            new Phaser.Game(config);
        }
    </script>
</body>
</html>
