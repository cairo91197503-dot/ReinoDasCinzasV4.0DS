        // ==================== GAME SCENE ====================
        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }

            create() {
                this.cameras.main.fadeIn(1500, 0, 0, 0);

                this.mapWidth = 3200;
                this.mapHeight = 3200;
                this.physics.world.setBounds(0, 0, this.mapWidth, this.mapHeight);

                // Mapa
                this.tileMap = [];
                this.mapGraphics = this.add.graphics();
                this.generateWorldMap();

                // Grupos
                this.walls = this.physics.add.staticGroup();
                this.npcs = this.physics.add.group();
                this.enemies = this.physics.add.group();
                this.projectiles = this.physics.add.group();
                this.drops = this.physics.add.group();

                this.spawnColliders();

                // Jogador
                this.player = this.physics.add.sprite(400, 500, 'player_down');
                this.player.setCollideWorldBounds(true);
                this.player.setSize(20, 28).setOffset(6, 4).setDepth(10);
                this.player.hp = GameState.playerHP;
                this.player.maxHp = GameState.playerMaxHP;
                this.player.stamina = GameState.playerStamina;
                this.player.maxStamina = GameState.playerMaxStamina;
                this.player.direction = 'down';
                this.player.isAttacking = false;
                this.player.attackCooldown = 0;
                this.player.invulnerable = false;
                this.player.isDodging = false;
                this.player.alive = true;

                // Fogueira (checkpoint)
                this.checkpointX = 400;
                this.checkpointY = 500;
                this.spawnBonfire(400, 500);

                // Colisões
                this.physics.add.collider(this.player, this.walls);
                this.physics.add.collider(this.enemies, this.walls);
                this.physics.add.collider(this.enemies, this.enemies);
                this.physics.add.overlap(this.player, this.enemies, this.onPlayerHitEnemy, null, this);
                this.physics.add.overlap(this.player, this.drops, this.onPlayerCollectDrop, null, this);
                this.physics.add.overlap(this.player, this.npcs, this.onPlayerNearNPC, null, this);

                // Câmera
                this.cameras.main.setBounds(0, 0, this.mapWidth, this.mapHeight);
                this.cameras.main.startFollow(this.player, true, 0.12, 0.12);

                // Iluminação
                this.lightOverlay = this.add.graphics().setDepth(90).setScrollFactor(0);

                // HUD
                this.scene.launch('HudScene', { gameScene: this });

                // NPC
                this.spawnNPC(480, 520, 'npc_villager', 'aldeao_elder');

                // Inimigos iniciais
                this.spawnEnemy(650, 450, 'enemy_darkknight', { hp: 4, damage: 1, speed: 45, aggro: 160,
                    xpValue: 30 });
                this.spawnEnemy(700, 600, 'enemy_wolf', { hp: 2, damage: 1, speed: 80, aggro: 180, xpValue: 20 });
                this.spawnEnemy(350, 650, 'enemy_darkknight', { hp: 4, damage: 1, speed: 45, aggro: 160,
                    xpValue: 30 });
                this.spawnEnemy(550, 700, 'enemy_wolf', { hp: 2, damage: 1, speed: 80, aggro: 180, xpValue: 20 });
                this.spawnEnemy(800, 350, 'enemy_darkknight', { hp: 5, damage: 2, speed: 40, aggro: 170,
                    xpValue: 40 });

                // Controles
                this.cursors = this.input.keyboard.createCursorKeys();
                this.wasd = {
                    up: this.input.keyboard.addKey('W'),
                    down: this.input.keyboard.addKey('S'),
                    left: this.input.keyboard.addKey('A'),
                    right: this.input.keyboard.addKey('D'),
                };
                this.attackKey = this.input.keyboard.addKey('J');
                this.dodgeKey = this.input.keyboard.addKey('K');
                this.interactKey = this.input.keyboard.addKey('E');
                this.questKey = this.input.keyboard.addKey('Q');

                this.input.keyboard.on('keydown-E', () => this.interactWithNPC());
                this.input.keyboard.on('keydown-Q', () => this.showQuestLog());

                this.setupMobileControls();

                // Diálogo inicial
                this.time.delayedCall(2000, () => {
                    this.showDialog('Kael Ashborn',
                        'Acordei entre os escombros...\nMinha vila foi destruída por cavaleiros sombrios.\nPreciso lutar para sobreviver.',
                        () => {
                            this.showDialog('Sistema',
                                '⚔️ COMBATE\n\n🖱️ Clique/Toque no botão ⚔️ para atacar\n🌀 Use esquiva para desviar\n💚 Derrote inimigos para ganhar XP e drops',
                                null);
                        });
                });

                console.log('⚔️ [Passo 2] Combate iniciado');
            }

            // ==================== MAPA ====================
            generateWorldMap() {
                const g = this.mapGraphics;
                const ts = 32;
                const cols = Math.ceil(this.mapWidth / ts);
                const rows = Math.ceil(this.mapHeight / ts);
                this.tileMap = [];

                for (let row = 0; row < rows; row++) {
                    this.tileMap[row] = [];
                    for (let col = 0; col < cols; col++) {
                        const wx = col * ts;
                        const wy = row * ts;
                        const cx = wx - this.mapWidth / 2;
                        const cy = wy - this.mapHeight / 2;
                        let tile = 'grass';

                        if (Math.abs(cx) < 500 && Math.abs(cy) < 400) {
                            tile = 'grass';
                            if ((Math.abs(wx - 480) < 40 && wy > 250 && wy < 800) || (Math.abs(wy - 500) < 40 &&
                                    wx > 200 && wx < 900)) tile = 'path';
                            if (wx > 550 && wx < 750 && wy > 350 && wy < 550) tile = 'castle_floor';
                        } else if (cx > 500 && Math.abs(cy) < 500) tile = Math.random() < 0.7 ? 'lava' : 'stone';
                        else if (cx < -500 && Math.abs(cy) < 500) tile = 'grass_dark';
                        else if (cy < -400 && Math.abs(cx) < 700) tile = 'snow';
                        else if (cy > 600 && Math.abs(cx) < 400) tile = Math.random() < 0.5 ? 'stone' : 'water';
                        else if (Math.abs(cx) > 800 || Math.abs(cy) > 800) tile = 'water';

                        this.tileMap[row][col] = tile;

                        const colors = { 'grass': 0x2d5a27, 'grass_dark': 0x1a3d14, 'path': 0x6b5a4a,
                            'stone': 0x5a5a5a, 'water': 0x1a3a5a, 'lava': 0x3a1a00, 'snow': 0xddeeff,
                            'castle_floor': 0x4a3a2a };
                        g.fillStyle(colors[tile] || 0x2d5a27, 1);
                        g.fillRect(wx, wy, ts, ts);
                    }
                }

                // Castelo visual
                g.fillStyle(0x4a3a2a, 1);
                g.fillRect(560, 360, 160, 160);
                g.lineStyle(3, 0x6a5a4a, 1);
                g.strokeRect(560, 360, 160, 160);
                g.fillStyle(0x3a2a1a, 1);
                g.fillRect(600, 380, 80, 60);
                g.fillStyle(0x5a4a3a, 1);
                g.fillRect(550, 340, 30, 40);
                g.fillRect(700, 340, 30, 40);
                g.fillStyle(0x8b0000, 0.8);
                g.fillRect(555, 345, 20, 15);
                g.fillRect(705, 345, 20, 15);
            }

            spawnColliders() {
                const castleWalls = [
                    { x: 560, y: 360, w: 160, h: 8 }, { x: 560, y: 512, w: 160, h: 8 },
                    { x: 560, y: 368, w: 8, h: 144 }, { x: 712, y: 368, w: 8, h: 144 },
                ];
                castleWalls.forEach(w => {
                    this.walls.create(w.x + w.w / 2, w.y + w.h / 2, null).setSize(w.w, w.h).setVisible(false);
                });

                for (let i = 0; i < 60; i++) {
                    const tx = Phaser.Math.Between(100, this.mapWidth - 100);
                    const ty = Phaser.Math.Between(100, this.mapHeight - 100);
                    if (!(tx > 540 && tx < 740 && ty > 340 && ty < 540)) {
                        this.walls.create(tx, ty, null).setSize(24, 28).setVisible(false);
                        this.mapGraphics.fillStyle(0x1a3a0a, 1);
                        this.mapGraphics.fillRect(tx - 10, ty - 4, 20, 24);
                        this.mapGraphics.fillStyle(0x2a5a1a, 1);
                        this.mapGraphics.fillRect(tx - 6, ty - 6, 16, 20);
                    }
                }
            }

            spawnBonfire(x, y) {
                const bonfire = this.add.image(x, y, 'bonfire').setDepth(8);
                this.tweens.add({
                    targets: bonfire,
                    scale: 1.05,
                    alpha: 0.8,
                    duration: 800,
                    yoyo: true,
                    repeat: -1,
                });
                // Luz da fogueira
                const fireLight = this.add.circle(x, y, 60, 0xff6600, 0.08).setDepth(7);
                this.tweens.add({
                    targets: fireLight,
                    alpha: 0.12,
                    scale: 1.2,
                    duration: 1200,
                    yoyo: true,
                    repeat: -1,
                });
            }

            // ==================== NPC ====================
            spawnNPC(x, y, texture, id) {
                const npc = this.physics.add.sprite(x, y, texture);
                npc.setSize(20, 26).setOffset(6, 6).setDepth(8);
                npc.npcId = id;
                npc.dialogueIndex = 0;
                const indicator = this.add.text(x, y - 22, '💬', { fontSize: '14px' }).setOrigin(0.5).setDepth(9)
                    .setAlpha(0);
                npc.indicator = indicator;
                this.tweens.add({ targets: indicator, y: y - 26, alpha: 0.7, duration: 1000, yoyo: true,
                    repeat: -1 });
                this.npcs.add(npc);
            }

            onPlayerNearNPC(player, npc) { npc.nearPlayer = true; }

            interactWithNPC() {
                const nearby = this.npcs.getChildren().find(n => {
                    return Phaser.Math.Distance.Between(this.player.x, this.player.y, n.x, n.y) < 55 && n.active;
                });
                if (nearby) this.triggerDialogue(nearby);
            }

            triggerDialogue(npc) {
                if (npc.npcId === 'aldeao_elder') {
                    const dialogues = [
                        { speaker: 'Ancião da Vila',
                            text: 'Você sobreviveu... e já está lutando.\nOs cavaleiros sombrios espalharam-se por toda Arthon.\nSua espada será testada.', },
                        { speaker: 'Ancião da Vila',
                            text: 'Use a esquiva (K ou botão 🌀) para desviar dos golpes.\nAtaque com J ou ⚔️. A stamina é preciosa,\nuse-a com sabedoria.', },
                        { speaker: 'Ancião da Vila',
                            text: 'Derrote os cavaleiros que assolam a região.\nCada vitória o torna mais forte.\n\nA fogueira é seu refúgio — se cair, lá renascerá.', },
                    ];
                    const idx = npc.dialogueIndex;
                    if (idx < dialogues.length) {
                        this.showDialog(dialogues[idx].speaker, dialogues[idx].text, () => {
                            npc.dialogueIndex = idx + 1;
                            if (idx === 2) GameState.quests.main.step = 1;
                        });
                    } else {
                        this.showDialog('Ancião', 'Boa sorte, Herdeiro das Cinzas.', null);
                    }
                }
            }

            // ==================== COMBATE ====================
            playerAttack() {
                if (!this.player.alive || this.player.attackCooldown > 0 || this.player.isAttacking || this.player
                    .isDodging) return;
                if (this.player.stamina < 10) {
                    this.showFloatingText(this.player.x, this.player.y - 25, 'Sem stamina!', '#ff4444');
                    return;
                }

                this.player.isAttacking = true;
                this.player.attackCooldown = 28;
                this.player.stamina -= 10;

                const range = 38;
                let atkX = this.player.x;
                let atkY = this.player.y;
                switch (this.player.direction) {
                    case 'up':
                        atkY -= range;
                        break;
                    case 'down':
                        atkY += range;
                        break;
                    case 'left':
                        atkX -= range;
                        break;
                    case 'right':
                        atkX += range;
                        break;
                }

                // Efeito de slash
                const slash = this.add.circle(atkX, atkY, 18, 0xffffff, 0.7).setDepth(12);
                this.tweens.add({
                    targets: slash,
                    alpha: 0,
                    scale: 1.8,
                    duration: 180,
                    onComplete: () => slash.destroy(),
                });

                // Verificar acerto nos inimigos
                const weaponDamage = GameState.equipment.weapon?.damage || 3;
                const totalDamage = GameState.playerStats.strength + weaponDamage;
                let hitSomething = false;

                this.enemies.getChildren().forEach(enemy => {
                    if (!enemy.active) return;
                    const dist = Phaser.Math.Distance.Between(atkX, atkY, enemy.x, enemy.y);
                    if (dist < 35) {
                        this.damageEnemy(enemy, totalDamage);
                        hitSomething = true;
                    }
                });

                if (hitSomething) {
                    // Pequeno screen shake
                    this.cameras.main.shake(50, 0.003);
                }

                this.time.delayedCall(200, () => { this.player.isAttacking = false; });
            }

            playerDodge() {
                if (!this.player.alive || this.player.isDodging || this.player.stamina < 20) {
                    if (this.player.stamina < 20) this.showFloatingText(this.player.x, this.player.y - 25,
                        'Sem stamina!', '#ff4444');
                    return;
                }

                this.player.isDodging = true;
                this.player.invulnerable = true;
                this.player.stamina -= 20;
                this.player.setAlpha(0.5);

                const dist = 55;
                let dx = 0,
                    dy = 0;
                switch (this.player.direction) {
                    case 'up':
                        dy = -dist;
                        break;
                    case 'down':
                        dy = dist;
                        break;
                    case 'left':
                        dx = -dist;
                        break;
                    case 'right':
                        dx = dist;
                        break;
                }

                // Partículas de esquiva
                const dodgeParticles = this.add.particles(this.player.x, this.player.y, 'particle', {
                    speed: { min: 40, max: 100 },
                    scale: { start: 0.8, end: 0 },
                    lifespan: 300,
                    quantity: 8,
                    tint: [0x888888, 0xcccccc],
                    emitting: false,
                });
                dodgeParticles.explode(8);

                this.tweens.add({
                    targets: this.player,
                    x: this.player.x + dx,
                    y: this.player.y + dy,
                    duration: 180,
                    ease: 'Power2',
                });

                this.time.delayedCall(400, () => {
                    this.player.isDodging = false;
                    this.player.invulnerable = false;
                    this.player.setAlpha(1);
                });
            }

            damageEnemy(enemy, damage) {
                if (!enemy.active) return;
                enemy.hp -= damage;

                // Flash vermelho
                enemy.setTintFill(0xff4444);
                this.time.delayedCall(80, () => { if (enemy.active) enemy.clearTint(); });

                // Knockback
                const angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                enemy.setVelocity(Math.cos(angle) * 120, Math.sin(angle) * 120);
                this.time.delayedCall(150, () => { if (enemy.active) enemy.setVelocity(0, 0); });

                // Número de dano
                const dmgText = this.add.text(enemy.x, enemy.y - 22, `-${damage}`, {
                    fontFamily: 'Georgia, serif',
                    fontSize: '16px',
                    color: '#ff4444',
                    stroke: '#000',
                    strokeThickness: 3,
                }).setOrigin(0.5).setDepth(25);
                this.tweens.add({
                    targets: dmgText,
                    y: dmgText.y - 35,
                    alpha: 0,
                    duration: 800,
                    onComplete: () => dmgText.destroy(),
                });

                if (enemy.hp <= 0) this.killEnemy(enemy);
            }

            killEnemy(enemy) {
                // Explosão de partículas
                const explosion = this.add.particles(enemy.x, enemy.y, 'particle', {
                    speed: { min: 50, max: 150 },
                    scale: { start: 1.2, end: 0 },
                    lifespan: 600,
                    quantity: 20,
                    tint: [0xff4400, 0xff0000, 0xff8800, 0xffff00],
                    emitting: false,
                });
                explosion.explode(20);

                // Drop
                const dropChance = Math.random();
                if (dropChance < 0.5) {
                    this.spawnDrop(enemy.x, enemy.y, 'gold');
                } else if (dropChance < 0.65) {
                    this.spawnDrop(enemy.x, enemy.y, 'potion');
                } else if (dropChance < 0.72) {
                    this.spawnDrop(enemy.x, enemy.y, 'equipment');
                }

                // XP
                const xp = enemy.xpValue || 25;
                GameState.playerXP += xp;
                this.showFloatingText(enemy.x, enemy.y - 35, `+${xp} XP`, '#aaaaff');
                if (GameState.playerXP >= GameState.xpToNext) this.levelUp();

                enemy.destroy();
            }

            spawnDrop(x, y, type) {
                let texture = 'coin_icon';
                let dropType = type;

                if (type === 'potion') texture = 'potion_icon';
                else if (type === 'equipment') texture = 'coin_icon'; // placeholder

                const drop = this.physics.add.sprite(x, y + Phaser.Math.Between(-10, 10), texture);
                drop.setDepth(5).setScale(1);
                drop.dropType = dropType;

                // Brilho pulsante
                this.tweens.add({
                    targets: drop,
                    alpha: 0.5,
                    scale: 1.1,
                    duration: 600,
                    yoyo: true,
                    repeat: -1,
                });

                this.drops.add(drop);
            }

            onPlayerCollectDrop(player, drop) {
                if (!drop.active) return;

                if (drop.dropType === 'gold') {
                    const amount = Phaser.Math.Between(8, 30);
                    GameState.gold += amount;
                    this.showFloatingText(player.x, player.y - 20, `+${amount} ouro`, '#ffcc00');
                } else if (drop.dropType === 'potion') {
                    const existing = GameState.inventory.find(i => i.name === 'Poção de Vida');
                    if (existing) existing.quantity = (existing.quantity || 1) + 1;
                    else GameState.inventory.push({ name: 'Poção de Vida', type: 'potion', heal: 2,
                        rarity: 'comum', icon: 'potion_red', quantity: 1 });
                    this.showFloatingText(player.x, player.y - 20, '+Poção de Vida', '#44ff44');
                } else if (drop.dropType === 'equipment') {
                    this.showFloatingText(player.x, player.y - 20, '+Equipamento (breve)', '#aa88ff');
                }

                drop.destroy();
            }

            levelUp() {
                GameState.playerLevel++;
                GameState.playerXP -= GameState.xpToNext;
                GameState.xpToNext = Math.floor(GameState.xpToNext * 1.5);
                GameState.playerMaxHP += 1;
                GameState.playerHP = GameState.playerMaxHP;
                GameState.playerMaxStamina += 10;
                GameState.playerStamina = GameState.playerMaxStamina;
                GameState.playerStats.strength += 1;
                GameState.playerStats.defense += 1;

                this.player.hp = GameState.playerHP;
                this.player.maxHp = GameState.playerMaxHP;
                this.player.stamina = GameState.playerStamina;
                this.player.maxStamina = GameState.playerMaxStamina;

                // Efeito de level up
                const lvlText = this.add.text(this.player.x, this.player.y - 45, '⬆ LEVEL UP! ⬆', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '22px',
                    color: '#ffcc00',
                    stroke: '#000',
                    strokeThickness: 5,
                }).setOrigin(0.5).setDepth(30);
                this.tweens.add({
                    targets: lvlText,
                    y: lvlText.y - 60,
                    alpha: 0,
                    scale: 1.3,
                    duration: 2000,
                    onComplete: () => lvlText.destroy(),
                });

                // Partículas douradas
                const lvlParticles = this.add.particles(this.player.x, this.player.y, 'particle', {
                    speed: { min: 30, max: 100 },
                    scale: { start: 1.5, end: 0 },
                    lifespan: 1000,
                    quantity: 25,
                    tint: [0xffcc00, 0xffdd44, 0xffffff],
                    emitting: false,
                });
                lvlParticles.explode(25);
            }

            onPlayerHitEnemy(player, enemy) {
                if (player.invulnerable || !player.alive || !enemy.active) return;
                if (enemy.attackCooldown > 0) return;

                enemy.attackCooldown = 45;
                const rawDamage = enemy.damage || 1;
                const damage = Math.max(1, rawDamage - Math.floor(GameState.playerStats.defense / 3));
                player.hp -= damage;
                GameState.playerHP = player.hp;
                player.invulnerable = true;
                player.setTintFill(0xff0000);

                // Knockback no jogador
                const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
                player.setVelocity(Math.cos(angle) * 150, Math.sin(angle) * 150);

                // Dano flutuante no jogador
                this.showFloatingText(player.x, player.y - 25, `-${damage}`, '#ff0000');

                this.time.delayedCall(250, () => { if (player.active) player.setVelocity(0, 0); });
                this.time.delayedCall(700, () => { player.invulnerable = false;
                    player.clearTint(); });

                if (player.hp <= 0) this.playerDeath();
            }

            playerDeath() {
                this.player.alive = false;
                this.player.setVelocity(0, 0);
                this.player.setTintFill(0x333333);
                this.player.setAlpha(0.6);

                this.cameras.main.fadeOut(1200, 0, 0, 0);

                this.showDialog('Destino',
                    'Você caiu em batalha...\nMas as cinzas sempre encontram\num caminho de volta.',
                    () => {
                        // Reviver na fogueira
                        this.player.setPosition(this.checkpointX, this.checkpointY);
                        this.player.hp = Math.ceil(this.player.maxHp / 2);
                        GameState.playerHP = this.player.hp;
                        this.player.alive = true;
                        this.player.clearTint();
                        this.player.setAlpha(1);
                        this.player.invulnerable = true;

                        this.cameras.main.fadeIn(1500, 0, 0, 0);

                        this.time.delayedCall(2000, () => { this.player.invulnerable = false; });
                    });
            }

            // ==================== INIMIGOS (IA) ====================
            spawnEnemy(x, y, texture, config = {}) {
                const enemy = this.physics.add.sprite(x, y, texture);
                enemy.setSize(24, 28).setOffset(4, 4).setDepth(9);
                enemy.hp = config.hp || 3;
                enemy.maxHp = config.hp || 3;
                enemy.damage = config.damage || 1;
                enemy.speed = config.speed || 45;
                enemy.aggroRange = config.aggro || 160;
                enemy.attackCooldown = 0;
                enemy.xpValue = config.xpValue || 25;
                enemy.healthBar = this.add.graphics().setDepth(11);
                this.enemies.add(enemy);
                return enemy;
            }

            updateEnemyAI(enemy) {
                if (!enemy.active || !this.player.alive) return;
                const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);

                if (dist < enemy.aggroRange && dist > 28) {
                    // Perseguir
                    const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, this.player.x, this.player.y);
                    enemy.setVelocity(Math.cos(angle) * enemy.speed, Math.sin(angle) * enemy.speed);
                } else if (dist <= 28 && enemy.attackCooldown <= 0) {
                    // Atacar
                    enemy.setVelocity(0, 0);
                    // O ataque é gerenciado pelo overlap
                } else if (dist > enemy.aggroRange) {
                    enemy.setVelocity(0, 0);
                } else {
                    enemy.setVelocity(0, 0);
                }

                // Barra de vida
                if (enemy.healthBar) {
                    enemy.healthBar.clear();
                    const bw = 28;
                    const bh = 4;
                    const hpPct = enemy.hp / enemy.maxHp;
                    enemy.healthBar.fillStyle(0x000000, 0.7);
                    enemy.healthBar.fillRect(enemy.x - bw / 2 - 1, enemy.y - 24, bw + 2, bh + 2);
                    enemy.healthBar.fillStyle(0xff0000, 0.9);
                    enemy.healthBar.fillRect(enemy.x - bw / 2, enemy.y - 23, bw * hpPct, bh);
                }

                // Cooldown de ataque
                if (enemy.attackCooldown > 0) enemy.attackCooldown--;
            }

            // ==================== DIÁLOGOS ====================
            showDialog(speaker, text, callback) {
                this.scene.pause();
                this.scene.launch('DialogScene', { speaker, text, callback, gameScene: this, isChoice: false });
            }

            showQuestLog() {
                let log = '📜 REGISTRO\n\n';
                log += `🔥 Principal: ${GameState.quests.main.title} (Etapa ${GameState.quests.main.step})\n`;
                log += `⚔️ Nível: ${GameState.playerLevel} | XP: ${GameState.playerXP}/${GameState.xpToNext}\n`;
                log += `💰 Ouro: ${GameState.gold}\n`;
                log += `🗡️ Arma: ${GameState.equipment.weapon?.name || 'Nenhuma'}\n`;
                log += `❤️ HP: ${this.player.hp}/${this.player.maxHp}\n`;
                log += `💚 Stamina: ${Math.floor(this.player.stamina)}/${this.player.maxStamina}`;
                this.showDialog('Status de Kael', log, () => this.scene.resume());
            }

            showFloatingText(x, y, text, color) {
                const ft = this.add.text(x, y, text, {
                    fontFamily: 'Georgia, serif',
                    fontSize: '13px',
                    color: color || '#ffffff',
                    stroke: '#000',
                    strokeThickness: 3,
                }).setOrigin(0.5).setDepth(25);
                this.tweens.add({
                    targets: ft,
                    y: ft.y - 40,
                    alpha: 0,
                    duration: 1500,
                    onComplete: () => ft.destroy(),
                });
            }

            // ==================== CONTROLES MOBILE ====================
            setupMobileControls() {
                this.joystickActive = false;
                this.joystickBasePos = { x: 75, y: 660 };
                this.mobileDirection = { x: 0, y: 0 };

                this.joystickBase = this.add.circle(75, 660, 42, 0x000000, 0.35).setScrollFactor(0).setDepth(150)
                    .setInteractive();
                this.joystickThumb = this.add.circle(75, 660, 22, 0xffffff, 0.45).setScrollFactor(0).setDepth(151);

                this.joystickBase.on('pointerdown', (pointer) => {
                    this.joystickActive = true;
                    this.joystickStart = { x: pointer.x, y: pointer.y };
                });

                this.input.on('pointermove', (pointer) => {
                    if (!this.joystickActive) return;
                    const dx = pointer.x - this.joystickStart.x;
                    const dy = pointer.y - this.joystickStart.y;
                    const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 38);
                    const angle = Math.atan2(dy, dx);
                    const tx = this.joystickStart.x + Math.cos(angle) * dist;
                    const ty = this.joystickStart.y + Math.sin(angle) * dist;
                    this.joystickThumb.setPosition(tx, ty);
                    this.mobileDirection = { x: Math.cos(angle) * (dist / 38), y: Math.sin(angle) * (dist / 38) };
                });

                this.input.on('pointerup', () => {
                    this.joystickActive = false;
                    this.joystickThumb.setPosition(75, 660);
                    this.mobileDirection = { x: 0, y: 0 };
                });

                // Botões de ação
                const btnBase = {
                    fontSize: '24px',
                    backgroundColor: 'rgba(0,0,0,0.6)',
                    padding: { x: 12, y: 8 },
                    color: '#c9a84c',
                };

                const atkBtn = this.add.text(400, 650, '⚔️', btnBase).setOrigin(0.5).setScrollFactor(0).setDepth(
                    150).setInteractive();
                atkBtn.on('pointerdown', () => this.playerAttack());

                const dodgeBtn = this.add.text(400, 700, '🌀', { ...btnBase, fontSize: '22px' }).setOrigin(0.5)
                    .setScrollFactor(0).setDepth(150).setInteractive();
                dodgeBtn.on('pointerdown', () => this.playerDodge());

                const interactBtn = this.add.text(350, 725, '👆', { ...btnBase, fontSize: '20px' }).setOrigin(0.5)
                    .setScrollFactor(0).setDepth(150).setInteractive();
                interactBtn.on('pointerdown', () => this.interactWithNPC());

                const questBtn = this.add.text(450, 725, '📜', { ...btnBase, fontSize: '18px' }).setOrigin(0.5)
                    .setScrollFactor(0).setDepth(150).setInteractive();
                questBtn.on('pointerdown', () => this.showQuestLog());
            }

            // ==================== ILUMINAÇÃO ====================
            updateLighting() {
                this.lightOverlay.clear();
                this.lightOverlay.fillStyle(0x000000, 0.58);
                this.lightOverlay.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

                const sx = this.player.x - this.cameras.main.scrollX;
                const sy = this.player.y - this.cameras.main.scrollY;

                const circles = [
                    { r: 155, a: 0.50 }, { r: 125, a: 0.40 }, { r: 95, a: 0.28 }, { r: 60, a: 0.10 },
                ];
                circles.forEach(c => {
                    this.lightOverlay.fillStyle(0x000000, c.a);
                    this.lightOverlay.fillCircle(sx, sy, c.r);
                });
            }

            // ==================== UPDATE ====================
            update() {
                if (!this.player || !this.player.active) return;

                // Movimento
                let mx = 0,
                    my = 0;
                const speed = 130;

                if (this.joystickActive) { mx = this.mobileDirection.x;
                    my = this.mobileDirection.y; } else {
                    if (this.cursors.left.isDown || this.wasd.left.isDown) mx = -1;
                    if (this.cursors.right.isDown || this.wasd.right.isDown) mx = 1;
                    if (this.cursors.up.isDown || this.wasd.up.isDown) my = -1;
                    if (this.cursors.down.isDown || this.wasd.down.isDown) my = 1;
                }

                if (mx !== 0 && my !== 0) { mx *= 0.707;
                    my *= 0.707; }

                if (this.player.alive && !this.player.isDodging) {
                    this.player.setVelocity(mx * speed, my * speed);
                }

                if (my < -0.1) this.player.direction = 'up';
                else if (my > 0.1) this.player.direction = 'down';
                else if (mx < -0.1) this.player.direction = 'left';
                else if (mx > 0.1) this.player.direction = 'right';

                // Cooldowns
                if (this.player.attackCooldown > 0) this.player.attackCooldown--;

                // Stamina
                if (this.player.stamina < this.player.maxStamina) this.player.stamina += 0.06;

                // IA dos inimigos
                this.enemies.getChildren().forEach(e => this.updateEnemyAI(e));

                // Ataque/Esquiva por teclado
                if (Phaser.Input.Keyboard.JustDown(this.attackKey)) this.playerAttack();
                if (Phaser.Input.Keyboard.JustDown(this.dodgeKey)) this.playerDodge();

                // Iluminação
                this.updateLighting();

                // Indicadores NPC
                this.npcs.getChildren().forEach(npc => {
                    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, npc.x, npc.y);
                    npc.nearPlayer = dist < 55;
                    if (npc.indicator) npc.indicator.setAlpha(npc.nearPlayer ? 0.8 : 0);
                });

                // GameState sync
                GameState.playerHP = this.player.hp;
                GameState.playerStamina = Math.floor(this.player.stamina);
            }
        }

        // ==================== HUD SCENE ====================
        class HudScene extends Phaser.Scene {
            constructor() { super('HudScene'); }

            init(data) { this.gameScene = data.gameScene; }

            create() {
                this.scene.bringToTop();
                const w = this.cameras.main.width;

                this.heartsContainer = this.add.container(10, 10);

                this.staminaBg = this.add.graphics();
                this.staminaBg.fillStyle(0x000000, 0.6);
                this.staminaBg.fillRoundedRect(10, 34, 104, 14, 3);
                this.staminaBg.lineStyle(1, 0xc9a84c, 0.6);
                this.staminaBg.strokeRoundedRect(10, 34, 104, 14, 3);

                this.staminaBar = this.add.graphics();
                this.staminaIcon = this.add.image(6, 41, 'stamina_icon').setOrigin(0, 0.5).setScale(0.9);

                this.levelText = this.add.text(w - 50, 10, '', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '15px',
                    color: '#c9a84c',
                    stroke: '#000',
                    strokeThickness: 3,
                });
                this.goldText = this.add.text(w - 80, 32, '', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '12px',
                    color: '#ffcc00',
                    stroke: '#000',
                    strokeThickness: 2,
                });

                this.xpBar = this.add.graphics();
                this.xpText = this.add.text(w / 2, GAME_HEIGHT - 12, '', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '9px',
                    color: '#aaaaff',
                    stroke: '#000',
                    strokeThickness: 2,
                }).setOrigin(0.5);

                this.combatHint = this.add.text(w / 2, GAME_HEIGHT - 28,
                    'J = Atacar | K = Esquivar | E = Interagir', {
                        fontFamily: 'Georgia, serif',
                        fontSize: '9px',
                        color: '#666666',
                        stroke: '#000',
                        strokeThickness: 2,
                    }).setOrigin(0.5);
            }

            update() {
                if (!this.gameScene?.player) return;
                const player = this.gameScene.player;
                const w = this.cameras.main.width;

                this.heartsContainer.removeAll(true);
                for (let i = 0; i < player.maxHp; i++) {
                    const heart = this.add.image(8 + i * 18, 8, i < player.hp ? 'heart_full' : 'heart_empty');
                    heart.setOrigin(0, 0).setScale(1.15);
                    this.heartsContainer.add(heart);
                }

                this.staminaBar.clear();
                const sp = player.stamina / player.maxStamina;
                const color = sp > 0.5 ? 0x44aa44 : sp > 0.25 ? 0xaaaa44 : 0xaa4444;
                this.staminaBar.fillStyle(color, 0.9);
                this.staminaBar.fillRoundedRect(12, 36, 100 * sp, 10, 2);

                this.levelText.setText(`Nv.${GameState.playerLevel}`);
                this.goldText.setText(`💰 ${GameState.gold}`);

                // XP bar
                this.xpBar.clear();
                const xpPct = GameState.playerXP / GameState.xpToNext;
                this.xpBar.fillStyle(0x222244, 0.7);
                this.xpBar.fillRoundedRect(w / 2 - 50, GAME_HEIGHT - 22, 100, 8, 3);
                this.xpBar.fillStyle(0x6666cc, 0.9);
                this.xpBar.fillRoundedRect(w / 2 - 50, GAME_HEIGHT - 22, 100 * xpPct, 8, 3);
                this.xpText.setText(`XP ${GameState.playerXP}/${GameState.xpToNext}`);
            }
        }

        // ==================== DIALOG SCENE ====================
        class DialogScene extends Phaser.Scene {
            constructor() { super('DialogScene'); }

            init(data) {
                this.speaker = data.speaker;
                this.text = data.text;
                this.callback = data.callback;
                this.gameScene = data.gameScene;
                this.isChoice = data.isChoice || false;
            }

            create() {
                const w = this.cameras.main.width;
                const h = this.cameras.main.height;

                const overlay = this.add.graphics();
                overlay.fillStyle(0x000000, 0.75);
                overlay.fillRect(0, 0, w, h);

                const boxW = w - 36;
                const boxH = 200;
                const boxX = 18;
                const boxY = h - boxH - 18;

                const box = this.add.graphics();
                box.fillStyle(0x1a1a1a, 0.97);
                box.fillRoundedRect(boxX, boxY, boxW, boxH, 14);
                box.lineStyle(3, 0xc9a84c, 0.9);
                box.strokeRoundedRect(boxX, boxY, boxW, boxH, 14);
                box.lineStyle(1, 0x8b0000, 0.5);
                box.strokeRoundedRect(boxX + 7, boxY + 7, boxW - 14, boxH - 14, 10);

                const nameBg = this.add.graphics();
                nameBg.fillStyle(0x8b0000, 0.9);
                const nameW = this.speaker.length * 11 + 30;
                nameBg.fillRoundedRect(boxX + 18, boxY - 16, nameW, 30, 7);
                nameBg.lineStyle(2, 0xc9a84c, 0.85);
                nameBg.strokeRoundedRect(boxX + 18, boxY - 16, nameW, 30, 7);

                this.add.text(boxX + 33, boxY - 2, this.speaker, {
                    fontFamily: 'Georgia, serif',
                    fontSize: '17px',
                    color: '#ffcc00',
                    stroke: '#000',
                    strokeThickness: 3,
                });

                const textObj = this.add.text(boxX + 22, boxY + 25, '', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '14px',
                    color: '#d4c48a',
                    stroke: '#000',
                    strokeThickness: 2,
                    wordWrap: { width: boxW - 44 },
                    lineSpacing: 5,
                });

                let charIdx = 0;
                const fullText = this.text;
                const typewriter = this.time.addEvent({
                    delay: 22,
                    callback: () => {
                        charIdx++;
                        textObj.setText(fullText.substring(0, charIdx));
                        if (charIdx >= fullText.length) {
                            typewriter.remove();
                            this.showPrompt(boxX, boxY, boxW, boxH);
                        }
                    },
                    loop: true,
                });

                const skip = () => {
                    if (charIdx < fullText.length) {
                        charIdx = fullText.length;
                        textObj.setText(fullText);
                        typewriter.remove();
                        this.showPrompt(boxX, boxY, boxW, boxH);
                    }
                };
                this.input.on('pointerdown', skip);
                this.input.keyboard.on('keydown-SPACE', skip);
                this.input.keyboard.on('keydown-ENTER', skip);
            }

            showPrompt(boxX, boxY, boxW, boxH) {
                const prompt = this.add.text(boxX + boxW - 35, boxY + boxH - 22, '▶', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '18px',
                    color: '#c9a84c',
                    stroke: '#000',
                    strokeThickness: 3,
                }).setOrigin(0.5).setInteractive({ useHandCursor: true });

                this.tweens.add({ targets: prompt, alpha: 0.4, duration: 600, yoyo: true, repeat: -1 });

                const advance = () => { prompt.destroy();
                    this.closeDialog(); };
                prompt.on('pointerdown', advance);
                this.input.keyboard.once('keydown-SPACE', advance);
                this.input.keyboard.once('keydown-ENTER', advance);
            }

            closeDialog() {
                if (this.callback) this.callback();
                this.scene.stop();
                if (this.gameScene) this.gameScene.scene.resume();
            }
        }

        // ==================== INICIALIZAÇÃO ====================
        console.log('🔥 REINO DAS CINZAS - PASSO 2: COMBATE');
        console.log('⚔️ Sistema de ataque com espada (J / botão ⚔️)');
        console.log('🌀 Esquiva com invulnerabilidade (K / botão 🌀)');
        console.log('👾 5 inimigos iniciais (Cavaleiros Sombrios + Lobos)');
        console.log('💀 IA de perseguição e ataque');
        console.log('💰 Drops: ouro, poções, equipamentos');
        console.log('⬆️ Level up ao acumular XP');
        console.log('🔥 Fogueira como checkpoint de revival');
        console.log('✅ Pronto para o Passo 3: RPG & Progressão');
    </script>
</body>
</html>

    <title>REINO DAS CINZAS - Passo 3: RPG & Progressão</title>
    <style>

</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js">
    </script>
    <script>
        // ============================================================
        // REINO DAS CINZAS - PASSO 3: RPG & PROGRESSÃO
        // ============================================================
        // Novas funcionalidades:
        // ✅ Inventário completo (abrir com I)
        // ✅ Equipar armas e armaduras
        // ✅ Usar poções durante o combate
        // ✅ Itens com raridade (comum, raro, épico, lendário)
        // ✅ Sistema de crafting na fogueira
        // ✅ Save/Load manual e automático
        // ✅ Minimapa com inimigos
        // ✅ Atributos afetando combate (força, defesa, agilidade)
        // ✅ Árvore de habilidades (atalho T)
        // ✅ 3 slots de equipamento (arma, armadura, acessório)
        // ============================================================

        const GAME_WIDTH = 480;
        const GAME_HEIGHT = 800;

        // ==================== ITENS E CRAFTING ====================
        const ItemDatabase = {
            'espada_curta': { name: 'Espada Curta', type: 'weapon', damage: 5, rarity: 'comum', icon: 'sword',
                value: 25 },
            'espada_longa': { name: 'Espada Longa', type: 'weapon', damage: 8, rarity: 'raro', icon: 'sword',
                value: 80 },
            'lamina_sombria': { name: 'Lâmina Sombria', type: 'weapon', damage: 14, rarity: 'épico', icon: 'sword_dark',
                value: 300 },
            'arco_curto': { name: 'Arco Curto', type: 'weapon', damage: 4, rarity: 'comum', icon: 'bow', value: 20 },
            'pocao_vida': { name: 'Poção de Vida', type: 'potion', heal: 2, rarity: 'comum', icon: 'potion_red',
                value: 15 },
            'pocao_vida_grande': { name: 'Poção de Vida Grande', type: 'potion', heal: 5, rarity: 'raro',
                icon: 'potion_red', value: 45 },
            'pocao_stamina': { name: 'Poção de Vigor', type: 'potion', staminaRestore: 50, rarity: 'comum',
                icon: 'potion_green', value: 12 },
            'armadura_couro': { name: 'Armadura de Couro', type: 'armor', defense: 3, rarity: 'comum', icon: 'armor',
                value: 40 },
            'armadura_ferro': { name: 'Armadura de Ferro', type: 'armor', defense: 6, rarity: 'raro', icon: 'armor',
                value: 120 },
            'amuleto_cinzas': { name: 'Amuleto das Cinzas', type: 'accessory', luck: 3, rarity: 'épico',
                icon: 'accessory', value: 200 },
            'anel_forca': { name: 'Anel de Força', type: 'accessory', strength: 2, rarity: 'raro', icon: 'ring',
                value: 90 },
            'essencia_fogo': { name: 'Essência de Fogo', type: 'crafting', rarity: 'raro', icon: 'essence', value: 50 },
            'essencia_gelo': { name: 'Essência de Gelo', type: 'crafting', rarity: 'raro', icon: 'essence', value: 50 },
            'ferro_bruto': { name: 'Ferro Bruto', type: 'crafting', rarity: 'comum', icon: 'ore', value: 10 },
            'couro': { name: 'Couro', type: 'crafting', rarity: 'comum', icon: 'leather', value: 8 },
        };

        const CraftingRecipes = [
            { result: 'pocao_vida_grande', materials: ['pocao_vida', 'pocao_vida', 'essencia_fogo'],
                description: 'Poção de Vida Grande' },
            { result: 'armadura_ferro', materials: ['armadura_couro', 'ferro_bruto', 'ferro_bruto'],
                description: 'Armadura de Ferro' },
            { result: 'lamina_sombria', materials: ['espada_longa', 'essencia_fogo', 'essencia_gelo'],
                description: 'Lâmina Sombria' },
        ];

        // ==================== GAMESTATE EXPANDIDO ====================
        const GameState = {
            playerLevel: 1,
            playerXP: 0,
            xpToNext: 100,
            skillPoints: 0,
            playerStats: { strength: 5, defense: 3, agility: 4, mana: 10, luck: 2 },
            playerHP: 5,
            playerMaxHP: 5,
            playerStamina: 100,
            playerMaxStamina: 100,
            gold: 50,
            inventory: [
                { id: 'espada_curta', quantity: 1 },
                { id: 'pocao_vida', quantity: 3 },
                { id: 'couro', quantity: 2 },
            ],
            equipment: {
                weapon: 'espada_curta',
                armor: null,
                accessory: null,
            },
            reputation: { arthon: 0, korag: 0, eldryn: 0, north: 0, stormIsle: 0 },
            quests: { main: { id: 'main_01', step: 0, title: 'O Despertar das Cinzas' }, side: [] },
            choices: { sparedVillage: null, executedKing: false, usedForbiddenMagic: false, freedDragons: false },
            currentRegion: 'arthon',
            gameTime: 0,
            dragonsDiscovered: 0,
            bossesDefeated: [],
            ending: null,
            discoveredRecipes: ['pocao_vida_grande'],
            lastSaveTime: null,
        };

        function getEquippedWeaponDamage() {
            const wpnId = GameState.equipment.weapon;
            if (wpnId && ItemDatabase[wpnId]) return ItemDatabase[wpnId].damage || 3;
            return 3;
        }

        function getEquippedArmorDefense() {
            const armId = GameState.equipment.armor;
            if (armId && ItemDatabase[armId]) return ItemDatabase[armId].defense || 0;
            return 0;
        }

        function getTotalStat(statName) {
            let total = GameState.playerStats[statName] || 0;
            // Bônus de equipamentos
            ['weapon', 'armor', 'accessory'].forEach(slot => {
                const id = GameState.equipment[slot];
                if (id && ItemDatabase[id] && ItemDatabase[id][statName]) {
                    total += ItemDatabase[id][statName];
                }
            });
            return total;
        }

        function addToInventory(itemId, qty = 1) {
            const existing = GameState.inventory.find(i => i.id === itemId);
            if (existing) {
                existing.quantity += qty;
            } else {
                GameState.inventory.push({ id: itemId, quantity: qty });
            }
        }

        function removeFromInventory(itemId, qty = 1) {
            const existing = GameState.inventory.find(i => i.id === itemId);
            if (!existing) return false;
            existing.quantity -= qty;
            if (existing.quantity <= 0) {
                GameState.inventory = GameState.inventory.filter(i => i.id !== itemId);
            }
            return true;
        }

        function countInInventory(itemId) {
            const existing = GameState.inventory.find(i => i.id === itemId);
            return existing ? existing.quantity : 0;
        }

        function saveGame() {
            GameState.lastSaveTime = Date.now();
            localStorage.setItem('reino_das_cinzas_save', JSON.stringify(GameState));
            console.log('💾 Jogo salvo!');
            return true;
        }

        function loadGame() {
            const saved = localStorage.getItem('reino_das_cinzas_save');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.assign(GameState, data);
                    console.log('💾 Save carregado!');
                    return true;
                } catch (e) {
                    console.log('⚠️ Save corrompido');
                    return false;
                }
            }
            return false;
        }

        // ==================== CONFIGURAÇÃO PHASER ====================
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: GAME_WIDTH,
            height: GAME_HEIGHT,
            pixelArt: true,
            roundPixels: true,
            scale: {

        // ==================== BOOT SCENE ====================
        class BootScene extends Phaser.Scene {
            constructor() { super('BootScene'); }
            preload() {
                const w = this.cameras.main.width;
                const h = this.cameras.main.height;
                const barW = 300,
                    barH = 20;
                const barX = (w - barW) / 2,
                    barY = h / 2;
                const bg = this.add.graphics();
                bg.fillGradientStyle(0x0a0a0a, 0x0a0a0a, 0x1a0a0a, 0x1a0a0a, 1);
                bg.fillRect(0, 0, w, h);
                const titleText = this.add.text(w / 2, barY - 70, 'REINO DAS CINZAS', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '28px',
                    color: '#c9a84c',
                    stroke: '#000',
                    strokeThickness: 4,
                }).setOrigin(0.5).setAlpha(0);
                this.tweens.add({ targets: titleText, alpha: 1, duration: 800 });
                const progressBox = this.add.graphics();
                progressBox.fillStyle(0x1a1a1a, 0.8);
                progressBox.fillRect(barX - 4, barY - 4, barW + 8, barH + 8);
                progressBox.lineStyle(2, 0xc9a84c, 0.8);
                progressBox.strokeRect(barX - 4, barY - 4, barW + 8, barH + 8);

                const loadingText = this.add.text(w / 2, barY + 30, 'Tecendo o destino...', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '14px',
                    color: '#8a8a8a',
                }).setOrigin(0.5);
                this.load.on('progress', (value) => { loadingBar.clear();
                    loadingBar.fillStyle(0xc9a84c, 1);
                    loadingBar.fillRect(barX, barY, barW * value, barH); });
                this.load.on('complete', () => { loadingBar.destroy();
                    progressBox.destroy();
                    loadingText.destroy();
                    titleText.destroy();
                    bg.destroy(); });
                generateAllTextures(this);
                for (let i = 0; i < 15; i++) this.load.image(`dummy_${i}`,
                    'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=='
                    );
            }
            create() {
                loadGame();
                this.time.delayedCall(600, () => {
                    this.cameras.main.fadeOut(500, 0, 0, 0);
                    this.time.delayedCall(500, () => this.scene.start('MenuScene'));

        // ==================== GAME SCENE ====================
        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }
            create() {
                this.cameras.main.fadeIn(1500, 0, 0, 0);
                this.mapWidth = 3200;
                this.mapHeight = 3200;
                this.physics.world.setBounds(0, 0, this.mapWidth, this.mapHeight);
                this.tileMap = [];
                this.mapGraphics = this.add.graphics();
                this.generateWorldMap();
                this.walls = this.physics.add.staticGroup();
                this.npcs = this.physics.add.group();
                this.enemies = this.physics.add.group();
                this.drops = this.physics.add.group();
                this.spawnColliders();
                this.player = this.physics.add.sprite(400, 500, 'player_down');
                this.player.setCollideWorldBounds(true).setSize(20, 28).setOffset(6, 4).setDepth(10);
                this.player.hp = GameState.playerHP;
                this.player.maxHp = GameState.playerMaxHP;
                this.player.stamina = GameState.playerStamina;
                this.player.maxStamina = GameState.playerMaxStamina;
                this.player.direction = 'down';
                this.player.isAttacking = false;
                this.player.attackCooldown = 0;
                this.player.invulnerable = false;
                this.player.isDodging = false;
                this.player.alive = true;
                this.checkpointX = 400;
                this.checkpointY = 500;
                this.spawnBonfire(400, 500);
                this.physics.add.collider(this.player, this.walls);
                this.physics.add.collider(this.enemies, this.walls);
                this.physics.add.collider(this.enemies, this.enemies);
                this.physics.add.overlap(this.player, this.enemies, this.onPlayerHitEnemy, null, this);
                this.physics.add.overlap(this.player, this.drops, this.onPlayerCollectDrop, null, this);
                this.physics.add.overlap(this.player, this.npcs, this.onPlayerNearNPC, null, this);
                this.cameras.main.setBounds(0, 0, this.mapWidth, this.mapHeight);
                this.cameras.main.startFollow(this.player, true, 0.12, 0.12);
                this.lightOverlay = this.add.graphics().setDepth(90).setScrollFactor(0);
                this.minimapGraphics = this.add.graphics().setDepth(200).setScrollFactor(0);
                this.scene.launch('HudScene', { gameScene: this });
                this.spawnNPC(480, 520, 'npc_villager', 'aldeao_elder');
                this.spawnEnemy(650, 450, 'enemy_darkknight', { hp: 4, damage: 1, speed: 45, aggro: 160, xpValue: 30,
                    dropTable: ['ferro_bruto', 'couro', 'pocao_vida'] });
                this.spawnEnemy(700, 600, 'enemy_wolf', { hp: 2, damage: 1, speed: 80, aggro: 180, xpValue: 20,
                    dropTable: ['couro', 'pocao_vida'] });
                this.spawnEnemy(350, 650, 'enemy_darkknight', { hp: 4, damage: 1, speed: 45, aggro: 160, xpValue: 30,
                    dropTable: ['ferro_bruto', 'pocao_vida'] });
                this.spawnEnemy(550, 700, 'enemy_wolf', { hp: 2, damage: 1, speed: 80, aggro: 180, xpValue: 20,
                    dropTable: ['couro'] });
                this.spawnEnemy(800, 350, 'enemy_darkknight', { hp: 6, damage: 2, speed: 40, aggro: 170, xpValue: 45,
                    dropTable: ['espada_longa', 'ferro_bruto', 'essencia_fogo'] });
                this.cursors = this.input.keyboard.createCursorKeys();
                this.wasd = { up: this.input.keyboard.addKey('W'), down: this.input.keyboard.addKey('S'),
                    left: this.input.keyboard.addKey('A'), right: this.input.keyboard.addKey('D') };
                this.attackKey = this.input.keyboard.addKey('J');
                this.dodgeKey = this.input.keyboard.addKey('K');
                this.interactKey = this.input.keyboard.addKey('E');
                this.questKey = this.input.keyboard.addKey('Q');
                this.inventoryKey = this.input.keyboard.addKey('I');
                this.skillKey = this.input.keyboard.addKey('T');
                this.craftKey = this.input.keyboard.addKey('C');
                this.input.keyboard.on('keydown-E', () => this.interactWithNPC());
                this.input.keyboard.on('keydown-Q', () => this.showQuestLog());
                this.input.keyboard.on('keydown-I', () => { this.scene.pause();
                    this.scene.launch('InventoryScene', { gameScene: this }); });
                this.input.keyboard.on('keydown-T', () => { this.scene.pause();
                    this.scene.launch('SkillScene', { gameScene: this }); });
                this.input.keyboard.on('keydown-C', () => {
                    const distToBonfire = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.checkpointX,
                        this.checkpointY);
                    if (distToBonfire < 70) { this.scene.pause();
                        this.scene.launch('CraftingScene', { gameScene: this }); } else { this.showFloatingText(this

                this.setupMobileControls();
                this.time.delayedCall(2000, () => {
                    this.showDialog('Kael Ashborn',

                this.autoSaveTimer = this.time.addEvent({ delay: 45000, callback: () => { GameState.playerHP = this

                    loop: true });
                console.log('🎒 [Passo 3] RPG & Progressão iniciado');
            }

            generateWorldMap() {
                const g = this.mapGraphics;
                const ts = 32;
                const cols = Math.ceil(this.mapWidth / ts);
                const rows = Math.ceil(this.mapHeight / ts);
                this.tileMap = [];
                for (let row = 0; row < rows; row++) {
                    this.tileMap[row] = [];
                    for (let col = 0; col < cols; col++) {
                        const wx = col * ts,
                            wy = row * ts;
                        const cx = wx - this.mapWidth / 2,
                            cy = wy - this.mapHeight / 2;
                        let tile = 'grass';
                        if (Math.abs(cx) < 500 && Math.abs(cy) < 400) {
                            tile = 'grass';
                            if ((Math.abs(wx - 480) < 40 && wy > 250 && wy < 800) || (Math.abs(wy - 500) < 40 && wx > 200 &&
                                    wx < 900)) tile = 'path';
                            if (wx > 550 && wx < 750 && wy > 350 && wy < 550) tile = 'castle_floor';
                        } else if (cx > 500 && Math.abs(cy) < 500) tile = Math.random() < 0.7 ? 'lava' : 'stone';
                        else if (cx < -500 && Math.abs(cy) < 500) tile = 'grass_dark';
                        else if (cy < -400 && Math.abs(cx) < 700) tile = 'snow';
                        else if (cy > 600 && Math.abs(cx) < 400) tile = Math.random() < 0.5 ? 'stone' : 'water';
                        else if (Math.abs(cx) > 800 || Math.abs(cy) > 800) tile = 'water';
                        this.tileMap[row][col] = tile;
                        const colors = { 'grass': 0x2d5a27, 'grass_dark': 0x1a3d14, 'path': 0x6b5a4a, 'stone': 0x5a5a5a,
                            'water': 0x1a3a5a, 'lava': 0x3a1a00, 'snow': 0xddeeff, 'castle_floor': 0x4a3a2a };
                        g.fillStyle(colors[tile] || 0x2d5a27, 1);
                        g.fillRect(wx, wy, ts, ts);
                    }
                }
                g.fillStyle(0x4a3a2a, 1);
                g.fillRect(560, 360, 160, 160);
                g.lineStyle(3, 0x6a5a4a, 1);
                g.strokeRect(560, 360, 160, 160);
                g.fillStyle(0x3a2a1a, 1);
                g.fillRect(600, 380, 80, 60);
                g.fillStyle(0x5a4a3a, 1);
                g.fillRect(550, 340, 30, 40);
                g.fillRect(700, 340, 30, 40);
                g.fillStyle(0x8b0000, 0.8);
                g.fillRect(555, 345, 20, 15);
                g.fillRect(705, 345, 20, 15);
            }

            spawnColliders() {
                [{ x: 560, y: 360, w: 160, h: 8 }, { x: 560, y: 512, w: 160, h: 8 }, { x: 560, y: 368, w: 8,
                        h: 144 }, { x: 712, y: 368, w: 8, h: 144 }
                ].forEach(w => { this.walls.create(w.x + w.w / 2, w.y + w.h / 2, null).setSize(w.w, w.h)
                    .setVisible(false); });
                for (let i = 0; i < 60; i++) {
                    const tx = Phaser.Math.Between(100, this.mapWidth - 100),
                        ty = Phaser.Math.Between(100, this.mapHeight - 100);
                    if (!(tx > 540 && tx < 740 && ty > 340 && ty < 540)) {
                        this.walls.create(tx, ty, null).setSize(24, 28).setVisible(false);
                        this.mapGraphics.fillStyle(0x1a3a0a, 1);
                        this.mapGraphics.fillRect(tx - 10, ty - 4, 20, 24);
                        this.mapGraphics.fillStyle(0x2a5a1a, 1);
                        this.mapGraphics.fillRect(tx - 6, ty - 6, 16, 20);
                    }
                }
            }

            spawnBonfire(x, y) {
                const bonfire = this.add.image(x, y, 'bonfire').setDepth(8);
                this.tweens.add({ targets: bonfire, scale: 1.05, alpha: 0.8, duration: 800, yoyo: true, repeat: -1 });
                const fireLight = this.add.circle(x, y, 60, 0xff6600, 0.08).setDepth(7);
                this.tweens.add({ targets: fireLight, alpha: 0.12, scale: 1.2, duration: 1200, yoyo: true, repeat: -1 });
                this.add.text(x, y - 30, '🔥 Fogueira\n💾 Salvar/Craftar', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '8px',
                    color: '#ffcc00',
                    stroke: '#000',
                    strokeThickness: 2,
                    align: 'center',
                }).setOrigin(0.5).setDepth(9);
            }

            spawnNPC(x, y, texture, id) {
                const npc = this.physics.add.sprite(x, y, texture);
                npc.setSize(20, 26).setOffset(6, 6).setDepth(8);
                npc.npcId = id;
                npc.dialogueIndex = 0;
                const indicator = this.add.text(x, y - 22, '💬', { fontSize: '14px' }).setOrigin(0.5).setDepth(9).setAlpha(
                    0);
                npc.indicator = indicator;
                this.tweens.add({ targets: indicator, y: y - 26, alpha: 0.7, duration: 1000, yoyo: true, repeat: -1 });
                this.npcs.add(npc);
