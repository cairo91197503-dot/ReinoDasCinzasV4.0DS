<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REINO DAS CINZAS - Passo 1: Fundação</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --gold: #c9a84c;
            --blood: #8b0000;
            --ash: #4a4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 900px;
            max-height: 1600px;
            aspect-ratio: 9/16;
            box-shadow: 0 0 60px rgba(180, 120, 30, 0.3), 0 0 120px rgba(0, 0, 0, 0.8);
            border: 2px solid #2a1f0a;
            border-radius: 4px;
            overflow: hidden;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        @media (min-width: 900px) {
            #game-container {
                max-height: 95vh;
                aspect-ratio: auto;
                height: 95vh;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js">
    </script>

    <script>
        // ============================================================
        // REINO DAS CINZAS - PASSO 1: FUNDAÇÃO
        // ============================================================
        // Este passo estabelece:
        // ✅ Boot scene com barra de carregamento estilizada
        // ✅ Menu principal com partículas de cinzas
        // ✅ Mapa procedural com 5 biomas distintos
        // ✅ Jogador com movimento 8 direções
        // ✅ Câmera com follow e limites do mundo
        // ✅ Sistema de colisão com paredes
        // ✅ HUD: corações de vida, barra de stamina, nível
        // ✅ Sistema de diálogo com efeito typewriter
        // ✅ Primeiro NPC com quest inicial e escolhas
        // ✅ Controles mobile: joystick virtual
        // ✅ Iluminação dinâmica (círculo de luz)
        // ✅ GameState com todos os dados do jogo
        // ✅ Estrutura pronta para os próximos passos
        // ============================================================

        const GAME_WIDTH = 480;
        const GAME_HEIGHT = 800;

        // ==================== ESTADO GLOBAL DO JOGO ====================
        const GameState = {
            // Progressão
            playerLevel: 1,
            playerXP: 0,
            xpToNext: 100,

            // Atributos
            playerStats: {
                strength: 5,
                defense: 3,
                agility: 4,
                mana: 10,
                luck: 2,
            },

            // Vida e Stamina
            playerHP: 5,
            playerMaxHP: 5,
            playerStamina: 100,
            playerMaxStamina: 100,

            // Economia
            gold: 50,

            // Inventário
            inventory: [
                { name: 'Espada Curta', type: 'weapon', damage: 5, rarity: 'comum', icon: 'sword' },
                { name: 'Poção de Vida', type: 'potion', heal: 2, rarity: 'comum', icon: 'potion_red',
                quantity: 3 },
            ],
            equipment: {
                weapon: { name: 'Espada Curta', type: 'weapon', damage: 5, rarity: 'comum' },
                armor: null,
                accessory: null,
            },

            // Reputação (cada reino)
            reputation: {
                arthon: 0,
                korag: 0,
                eldryn: 0,
                north: 0,
                stormIsle: 0,
            },

            // Quests
            quests: {
                main: { id: 'main_01', step: 0, title: 'O Despertar das Cinzas' },
                side: [],
            },

            // Escolhas que afetam o mundo
            choices: {
                sparedVillage: null,
                executedKing: false,
                usedForbiddenMagic: false,
                freedDragons: false,
            },

            // Progresso
            currentRegion: 'arthon',
            gameTime: 0,
            dragonsDiscovered: 0,
            bossesDefeated: [],
            ending: null,
        };

        // ==================== CONFIGURAÇÃO DO PHASER ====================
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: GAME_WIDTH,
            height: GAME_HEIGHT,
            pixelArt: true,
            roundPixels: true,
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: GAME_WIDTH,
                height: GAME_HEIGHT,
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false,
                },
            },
            scene: [BootScene, MenuScene, GameScene, HudScene, DialogScene],
            backgroundColor: '#0a0a0a',
            input: {
                activePointers: 3,
            },
        };

        const game = new Phaser.Game(config);

        // ==================== GERADOR DE TEXTURAS PIXEL ART ====================
        function generateAllTextures(scene) {
            // --- Jogador (Kael) - 4 direções ---
            const directions = ['down', 'up', 'left', 'right'];
            directions.forEach(dir => {
                const canvas = scene.textures.createCanvas(`player_${dir}`, 32, 32);
                const ctx = canvas.getContext();
                // Corpo base
                ctx.fillStyle = '#3a3a3a';
                ctx.fillRect(10, 6, 12, 18);
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(8, 24, 16, 8);
                // Marca de fogo no braço
                ctx.fillStyle = '#ff6600';
                ctx.fillRect(6, 10, 3, 6);
                ctx.fillStyle = '#ff8800';
                ctx.fillRect(7, 11, 1, 4);
                // Cabeça
                ctx.fillStyle = '#6b3a2a';
                ctx.fillRect(12, 2, 8, 6);
                ctx.fillStyle = '#8b0000';
                ctx.fillRect(14, 4, 2, 2);
                ctx.fillRect(18, 4, 2, 2);
                // Detalhe dourado (herdeiro das cinzas)
                ctx.fillStyle = '#c9a84c';
                ctx.fillRect(10, 8, 4, 4);
                canvas.refresh();
            });

            // --- Jogador atacando (frame único) ---
            const atkCanvas = scene.textures.createCanvas('player_attack', 32, 32);
            const aCtx = atkCanvas.getContext();
            aCtx.drawImage(scene.textures.get('player_down').getCanvas(), 0, 0);
            aCtx.fillStyle = '#ffffff';
            aCtx.fillRect(22, 12, 10, 3);
            aCtx.fillStyle = '#ffcc00';
            aCtx.fillRect(24, 10, 2, 8);
            atkCanvas.refresh();

            // --- NPC Aldeão ---
            const npcCanvas = scene.textures.createCanvas('npc_villager', 32, 32);
            const nCtx = npcCanvas.getContext();
            nCtx.fillStyle = '#5a4a3a';
            nCtx.fillRect(10, 6, 12, 16);
            nCtx.fillStyle = '#3a2a1a';
            nCtx.fillRect(8, 22, 16, 10);
            nCtx.fillStyle = '#d4a574';
            nCtx.fillRect(12, 2, 8, 6);
            nCtx.fillStyle = '#3366cc';
            nCtx.fillRect(14, 4, 2, 2);
            nCtx.fillRect(18, 4, 2, 2);
            nCtx.fillStyle = '#884422';
            nCtx.fillRect(13, 0, 2, 4);
            npcCanvas.refresh();

            // --- Inimigo placeholder (será expandido no Passo 2) ---
            const enemyCanvas = scene.textures.createCanvas('enemy_placeholder', 32, 32);
            const eCtx = enemyCanvas.getContext();
            eCtx.fillStyle = '#1a0000';
            eCtx.fillRect(8, 4, 16, 20);
            eCtx.fillStyle = '#0d0000';
            eCtx.fillRect(6, 24, 20, 8);
            eCtx.fillStyle = '#ff0000';
            eCtx.fillRect(12, 2, 8, 6);
            eCtx.fillRect(14, 4, 3, 2);
            eCtx.fillRect(18, 4, 3, 2);
            enemyCanvas.refresh();

            // --- Tiles do mapa (32x32) ---
            const tileDefs = {
                'grass': { base: '#2d5a27', accent: '#3a6b30', detail: '#1e4a1a' },
                'grass_dark': { base: '#1a3d14', accent: '#224a1c', detail: '#0f2a0a' },
                'path': { base: '#6b5a4a', accent: '#7a6a5a', detail: '#5a4a3a' },
                'stone': { base: '#5a5a5a', accent: '#6a6a6a', detail: '#4a4a4a' },
                'wall': { base: '#3a3a3a', accent: '#4a4a4a', detail: '#2a2a2a' },
                'water': { base: '#1a3a5a', accent: '#2a5a8a', detail: '#0a2a4a' },
                'lava': { base: '#3a1a00', accent: '#5a2a00', detail: '#ff4400' },
                'snow': { base: '#ddeeff', accent: '#ffffff', detail: '#bbccdd' },
                'castle_floor': { base: '#4a3a2a', accent: '#5a4a3a', detail: '#3a2a1a' },
                'wood': { base: '#5a3a1a', accent: '#6a4a2a', detail: '#4a2a0a' },
            };

            for (const [name, cols] of Object.entries(tileDefs)) {
                const tCanvas = scene.textures.createCanvas(`tile_${name}`, 32, 32);
                const tCtx = tCanvas.getContext();
                tCtx.fillStyle = cols.base;
                tCtx.fillRect(0, 0, 32, 32);
                // Textura pixelada
                tCtx.fillStyle = cols.accent;
                for (let i = 0; i < 6; i++) {
                    tCtx.fillRect(Math.floor(Math.random() * 24) + 4, Math.floor(Math.random() * 24) + 4, 2, 2);
                }
                tCtx.fillStyle = cols.detail;
                for (let i = 0; i < 4; i++) {
                    tCtx.fillRect(Math.floor(Math.random() * 28) + 2, Math.floor(Math.random() * 28) + 2, 1, 1);
                }
                // Borda sutil
                tCtx.fillStyle = 'rgba(0,0,0,0.2)';
                tCtx.fillRect(0, 0, 32, 1);
                tCtx.fillRect(0, 0, 1, 32);
                tCanvas.refresh();
            }

            // --- Corações ---
            const heartFullCanvas = scene.textures.createCanvas('heart_full', 16, 16);
            const hfCtx = heartFullCanvas.getContext();
            hfCtx.fillStyle = '#cc0000';
            hfCtx.fillRect(4, 3, 8, 10);
            hfCtx.fillRect(2, 5, 4, 6);
            hfCtx.fillRect(10, 5, 4, 6);
            hfCtx.fillRect(6, 1, 4, 4);
            hfCtx.fillStyle = '#ff4444';
            hfCtx.fillRect(6, 4, 2, 2);
            hfCtx.fillRect(8, 7, 2, 3);
            heartFullCanvas.refresh();

            const heartEmptyCanvas = scene.textures.createCanvas('heart_empty', 16, 16);
            const heCtx = heartEmptyCanvas.getContext();
            heCtx.fillStyle = '#2a2a2a';
            heCtx.fillRect(4, 3, 8, 10);
            heCtx.fillRect(2, 5, 4, 6);
            heCtx.fillRect(10, 5, 4, 6);
            heCtx.fillRect(6, 1, 4, 4);
            heCtx.fillStyle = '#444444';
            heCtx.fillRect(6, 4, 2, 2);
            heartEmptyCanvas.refresh();

            // --- Ícone de stamina ---
            const stamCanvas = scene.textures.createCanvas('stamina_icon', 12, 12);
            const sCtx = stamCanvas.getContext();
            sCtx.fillStyle = '#44aa44';
            sCtx.fillRect(2, 2, 8, 8);
            sCtx.fillStyle = '#88ff88';
            sCtx.fillRect(4, 3, 4, 2);
            stamCanvas.refresh();

            // --- Partícula (cinza) ---
            const partCanvas = scene.textures.createCanvas('particle', 4, 4);
            const pCtx = partCanvas.getContext();
            pCtx.fillStyle = '#ffffff';
            pCtx.fillRect(0, 0, 4, 4);
            partCanvas.refresh();

            // --- Moeda (ícone) ---
            const coinCanvas = scene.textures.createCanvas('coin_icon', 12, 12);
            const cCtx = coinCanvas.getContext();
            cCtx.fillStyle = '#cc9900';
            cCtx.fillRect(3, 2, 6, 8);
            cCtx.fillRect(2, 4, 8, 4);
            cCtx.fillStyle = '#ffcc00';
            cCtx.fillRect(4, 3, 4, 2);
            cCtx.fillStyle = '#ffdd44';
            cCtx.fillRect(5, 4, 2, 1);
            coinCanvas.refresh();

            console.log('✅ [Passo 1] Texturas pixel art geradas com sucesso');
        }

        // ==================== BOOT SCENE ====================
        class BootScene extends Phaser.Scene {
            constructor() { super('BootScene'); }

            preload() {
                const w = this.cameras.main.width;
                const h = this.cameras.main.height;
                const barW = 300;
                const barH = 20;
                const barX = (w - barW) / 2;
                const barY = h / 2;

                // Fundo
                const bg = this.add.graphics();
                bg.fillGradientStyle(0x0a0a0a, 0x0a0a0a, 0x1a0a0a, 0x1a0a0a, 1);
                bg.fillRect(0, 0, w, h);

                // Título
                const titleText = this.add.text(w / 2, barY - 70, 'REINO DAS CINZAS', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '28px',
                    color: '#c9a84c',
                    stroke: '#000',
                    strokeThickness: 4,
                }).setOrigin(0.5).setAlpha(0);

                this.tweens.add({
                    targets: titleText,
                    alpha: 1,
                    duration: 800,
                    ease: 'Power2',
                });

                // Barra de progresso
                const progressBox = this.add.graphics();
                progressBox.fillStyle(0x1a1a1a, 0.8);
                progressBox.fillRect(barX - 4, barY - 4, barW + 8, barH + 8);
                progressBox.lineStyle(2, 0xc9a84c, 0.8);
                progressBox.strokeRect(barX - 4, barY - 4, barW + 8, barH + 8);

                const loadingBar = this.add.graphics();

                const loadingText = this.add.text(w / 2, barY + 30, 'Forjando as cinzas...', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '14px',
                    color: '#8a8a8a',
                }).setOrigin(0.5);

                // Eventos de carregamento
                this.load.on('progress', (value) => {
                    loadingBar.clear();
                    loadingBar.fillStyle(0xc9a84c, 1);
                    loadingBar.fillRect(barX, barY, barW * value, barH);
                });

                this.load.on('complete', () => {
                    loadingBar.destroy();
                    progressBox.destroy();
                    loadingText.destroy();
                    titleText.destroy();
                    bg.destroy();
                });

                // Gerar texturas proceduralmente
                generateAllTextures(this);

                // Simular assets (substituir por arquivos reais no futuro)
                for (let i = 0; i < 15; i++) {
                    this.load.image(`dummy_${i}`,
                        'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=='
                        );
                }
            }

            create() {
                // Tentar carregar save
                const saved = localStorage.getItem('reino_das_cinzas_save');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        Object.assign(GameState, data);
                        console.log('💾 Save carregado com sucesso');
                    } catch (e) {
                        console.log('⚠️ Save corrompido, iniciando novo jogo');
                    }
                }

                this.time.delayedCall(600, () => {
                    this.cameras.main.fadeOut(500, 0, 0, 0);
                    this.time.delayedCall(500, () => {
                        this.scene.start('MenuScene');
                    });
                });
            }
        }

        // ==================== MENU SCENE ====================
        class MenuScene extends Phaser.Scene {
            constructor() { super('MenuScene'); }

            create() {
                const w = this.cameras.main.width;
                const h = this.cameras.main.height;

                this.cameras.main.fadeIn(1500, 0, 0, 0);

                // Fundo gradiente
                const bg = this.add.graphics();
                bg.fillGradientStyle(0x0a0a0a, 0x0a0a0a, 0x1a0a0a, 0x1a0a0a, 1);
                bg.fillRect(0, 0, w, h);

                // Partículas de cinzas flutuantes
                for (let i = 0; i < 35; i++) {
                    const ash = this.add.circle(
                        Phaser.Math.Between(0, w),
                        Phaser.Math.Between(h * 0.3, h + 50),
                        Phaser.Math.Between(1, 3),
                        0x888888,
                        Phaser.Math.FloatBetween(0.15, 0.5)
                    );
                    this.tweens.add({
                        targets: ash,
                        y: ash.y - Phaser.Math.Between(60, 250),
                        x: ash.x + Phaser.Math.Between(-40, 40),
                        alpha: 0,
                        scale: 0.5,
                        duration: Phaser.Math.Between(4000, 10000),
                        repeat: -1,
                        delay: Phaser.Math.Between(0, 6000),
                        onRepeat: () => {
                            ash.y = h + 20;
                            ash.x = Phaser.Math.Between(0, w);
                            ash.alpha = Phaser.Math.FloatBetween(0.15, 0.5);
                            ash.scale = 1;
                        },
                    });
                }

                // Título épico
                const title = this.add.text(w / 2, h * 0.18, 'REINO\nDAS\nCINZAS', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '56px',
                    color: '#c9a84c',
                    stroke: '#000000',
                    strokeThickness: 10,
                    align: 'center',
                    lineSpacing: 6,
                }).setOrigin(0.5);

                // Efeito de pulsação dourada
                this.tweens.add({
                    targets: title,
                    alpha: 0.75,
                    scale: 1.02,
                    duration: 2500,
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut',
                });

                // Subtítulo
                const subtitle = this.add.text(w / 2, h * 0.38, 'O Herdeiro das Cinzas', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '18px',
                    color: '#8b0000',
                    stroke: '#000',
                    strokeThickness: 4,
                }).setOrigin(0.5);

                this.tweens.add({
                    targets: subtitle,
                    alpha: 0.6,
                    duration: 1800,
                    yoyo: true,
                    repeat: -1,
                });

                // Descrição atmosférica
                this.add.text(w / 2, h * 0.44, '"Quando as cinzas cobrirem os céus,\no último dragão despertará."', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '11px',
                    color: '#666666',
                    align: 'center',
                    fontStyle: 'italic',
                    lineSpacing: 4,
                }).setOrigin(0.5);

                // Botões
                const btnBaseStyle = {
                    fontFamily: 'Georgia, serif',
                    fontSize: '20px',
                    color: '#d4c48a',
                    stroke: '#000',
                    strokeThickness: 4,
                };

                const createMenuButton = (y, text, onClick, enabled = true) => {
                    const btn = this.add.text(w / 2, y, text, {
                        ...btnBaseStyle,
                        color: enabled ? '#d4c48a' : '#444444',
                    }).setOrigin(0.5).setInteractive({ useHandCursor: enabled });

                    if (enabled) {
                        btn.on('pointerover', () => btn.setColor('#ffffff'));
                        btn.on('pointerout', () => btn.setColor('#d4c48a'));
                        btn.on('pointerdown', onClick);
                    }

                    // Borda dourada
                    const border = this.add.graphics();
                    border.lineStyle(2, enabled ? 0xc9a84c : 0x333333, enabled ? 0.8 : 0.3);
                    const paddingX = 25;
                    const paddingY = 10;
                    border.strokeRoundedRect(
                        btn.x - btn.width / 2 - paddingX,
                        btn.y - btn.height / 2 - paddingY,
                        btn.width + paddingX * 2,
                        btn.height + paddingY * 2,
                        8
                    );

                    return btn;
                };

                // Botão Iniciar
                createMenuButton(h * 0.56, '🔱  INICIAR JORNADA', () => {
                    this.cameras.main.fadeOut(1200, 0, 0, 0);
                    this.time.delayedCall(1200, () => {
                        this.scene.start('GameScene');
                    });
                });

                // Botão Continuar
                const hasSave = !!localStorage.getItem('reino_das_cinzas_save');
                createMenuButton(h * 0.66, '📜  CONTINUAR', () => {
                    this.cameras.main.fadeOut(1000, 0, 0, 0);
                    this.time.delayedCall(1000, () => {
                        this.scene.start('GameScene');
                    });
                }, hasSave);

                // Versão e créditos
                this.add.text(w / 2, h * 0.82, 'PASSO 1: FUNDAÇÃO\nDark Fantasy RPG · Pixel Art 32bit', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '10px',
                    color: '#555555',
                    align: 'center',
                    lineSpacing: 4,
                }).setOrigin(0.5);

                this.add.text(w / 2, h * 0.92, 'Inspirado em Zelda: A Link to the Past\nChrono Trigger · Game of Thrones', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '9px',
                    color: '#444444',
                    align: 'center',
                    fontStyle: 'italic',
                    lineSpacing: 3,
                }).setOrigin(0.5);

                console.log('🎬 [Passo 1] Menu principal carregado');
            }
        }

        // ==================== GAME SCENE ====================
        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }

            create() {
                const w = this.cameras.main.width;
                const h = this.cameras.main.height;

                this.cameras.main.fadeIn(1500, 0, 0, 0);

                // --- DIMENSÕES DO MUNDO ---
                this.mapWidth = 3200; // 100 tiles
                this.mapHeight = 3200;
                this.physics.world.setBounds(0, 0, this.mapWidth, this.mapHeight);

                // --- GERAR MAPA ---
                this.tileMap = [];
                this.mapGraphics = this.add.graphics();
                this.generateWorldMap();

                // --- GRUPOS FÍSICOS ---
                this.walls = this.physics.add.staticGroup();
                this.npcs = this.physics.add.group();
                this.spawnColliders();

                // --- JOGADOR ---
                this.player = this.physics.add.sprite(400, 500, 'player_down');
                this.player.setCollideWorldBounds(true);
                this.player.setSize(20, 28);
                this.player.setOffset(6, 4);
                this.player.setDepth(10);
                this.player.hp = GameState.playerHP;
                this.player.maxHp = GameState.playerMaxHP;
                this.player.stamina = GameState.playerStamina;
                this.player.maxStamina = GameState.playerMaxStamina;
                this.player.direction = 'down';
                this.player.isMoving = false;

                // --- COLISÕES ---
                this.physics.add.collider(this.player, this.walls);
                this.physics.add.overlap(this.player, this.npcs, this.onPlayerNearNPC, null, this);

                // --- CÂMERA ---
                this.cameras.main.setBounds(0, 0, this.mapWidth, this.mapHeight);
                this.cameras.main.startFollow(this.player, true, 0.12, 0.12);

                // --- ILUMINAÇÃO ---
                this.lightOverlay = this.add.graphics().setDepth(90).setScrollFactor(0);

                // --- HUD ---
                this.scene.launch('HudScene', { gameScene: this });

                // --- NPC INICIAL ---
                this.spawnNPC(480, 520, 'npc_villager', 'aldeao_elder');

                // --- CONTROLES ---
                this.cursors = this.input.keyboard.createCursorKeys();
                this.wasd = {
                    up: this.input.keyboard.addKey('W'),
                    down: this.input.keyboard.addKey('S'),
                    left: this.input.keyboard.addKey('A'),
                    right: this.input.keyboard.addKey('D'),
                };
                this.interactKey = this.input.keyboard.addKey('E');
                this.questKey = this.input.keyboard.addKey('Q');

                // --- CONTROLES MOBILE ---
                this.setupMobileControls();

                // --- TECLAS ---

            // ==================== GERAÇÃO DO MAPA ====================
            generateWorldMap() {
                const g = this.mapGraphics;
                const tileSize = 32;
                const cols = Math.ceil(this.mapWidth / tileSize);
                const rows = Math.ceil(this.mapHeight / tileSize);

                this.tileMap = [];

                for (let row = 0; row < rows; row++) {
                    this.tileMap[row] = [];
                    for (let col = 0; col < cols; col++) {
                        const wx = col * tileSize;
                        const wy = row * tileSize;
                        let tileType = 'grass';

                        // Definir bioma por posição
                        const centerX = wx - this.mapWidth / 2;
                        const centerY = wy - this.mapHeight / 2;

                        // Reino de Arthon (centro) - área inicial
                        if (Math.abs(centerX) < 500 && Math.abs(centerY) < 400) {
                            tileType = 'grass';
                            // Caminhos principais
                            if ((Math.abs(wx - 480) < 40 && wy > 250 && wy < 800) ||
                                (Math.abs(wy - 500) < 40 && wx > 200 && wx < 900)) {
                                tileType = 'path';
                            }
                            // Castelo central
                            if (wx > 550 && wx < 750 && wy > 350 && wy < 550) {
                                tileType = 'castle_floor';
                            }
                        }
                        // Korag - Região Vulcânica (leste)
                        else if (centerX > 500 && Math.abs(centerY) < 500) {
                            tileType = Math.random() < 0.7 ? 'lava' : 'stone';
                        }
                        // Eldryn - Floresta Mágica (oeste)
                        else if (centerX < -500 && Math.abs(centerY) < 500) {
                            tileType = 'grass_dark';
                        }
                        // Norte Congelado
                        else if (centerY < -400 && Math.abs(centerX) < 700) {
                            tileType = 'snow';
                        }
                        // Ilha da Tempestade (extremo sul)
                        else if (centerY > 600 && Math.abs(centerX) < 400) {
                            tileType = Math.random() < 0.5 ? 'stone' : 'water';
                        }
                        // Água nos limites
                        else if (Math.abs(centerX) > 800 || Math.abs(centerY) > 800) {
                            tileType = 'water';
                        }

                        this.tileMap[row][col] = tileType;

                        // Desenhar tile
                        const colors = {
                            'grass': 0x2d5a27,
                            'grass_dark': 0x1a3d14,
                            'path': 0x6b5a4a,
                            'stone': 0x5a5a5a,
                            'wall': 0x3a3a3a,
                            'water': 0x1a3a5a,
                            'lava': 0x3a1a00,
                            'snow': 0xddeeff,
                            'castle_floor': 0x4a3a2a,
                            'wood': 0x5a3a1a,
                        };
                        g.fillStyle(colors[tileType] || 0x2d5a27, 1);
                        g.fillRect(wx, wy, tileSize, tileSize);

                        // Detalhes nos tiles
                        if (tileType === 'grass' && Math.random() < 0.08) {
                            g.fillStyle(0x1a4a14, 0.5);
                            g.fillRect(wx + 10, wy + 8, 4, 4);
                        }
                        if (tileType === 'snow' && Math.random() < 0.1) {
                            g.fillStyle(0xffffff, 0.8);
                            g.fillRect(wx + 14, wy + 12, 3, 3);
                        }
                        if (tileType === 'lava' && Math.random() < 0.15) {
                            g.fillStyle(0xff4400, 0.6);
                            g.fillRect(wx + 12, wy + 10, 6, 6);
                        }
                    }
                }

                // Desenhar castelo (visual)
                g.fillStyle(0x4a3a2a, 1);
                g.fillRect(560, 360, 160, 160);
                g.lineStyle(3, 0x6a5a4a, 1);
                g.strokeRect(560, 360, 160, 160);
                g.fillStyle(0x3a2a1a, 1);
                g.fillRect(600, 380, 80, 60);
                g.lineStyle(2, 0x5a4a3a, 1);
                g.strokeRect(600, 380, 80, 60);
                // Torres
                g.fillStyle(0x5a4a3a, 1);
                g.fillRect(550, 340, 30, 40);
                g.fillRect(700, 340, 30, 40);
                g.fillStyle(0x8b0000, 0.8);
                g.fillRect(555, 345, 20, 15);
                g.fillRect(705, 345, 20, 15);
            }

            // ==================== COLISORES ====================
            spawnColliders() {
                // Paredes do castelo
                const castleWalls = [
                    { x: 560, y: 360, w: 160, h: 8 },
                    { x: 560, y: 512, w: 160, h: 8 },
                    { x: 560, y: 368, w: 8, h: 144 },
                    { x: 712, y: 368, w: 8, h: 144 },
                ];

                castleWalls.forEach(w => {
                    const wall = this.walls.create(w.x + w.w / 2, w.y + w.h / 2, null);
                    wall.setSize(w.w, w.h).setVisible(false);
                });

                // Árvores ao redor do mapa
                const treePositions = [];
                for (let i = 0; i < 60; i++) {
                    const tx = Phaser.Math.Between(100, this.mapWidth - 100);
                    const ty = Phaser.Math.Between(100, this.mapHeight - 100);
                    // Verificar se não está sobre o castelo
                    if (!(tx > 540 && tx < 740 && ty > 340 && ty < 540)) {
                        treePositions.push({ x: tx, y: ty });
                    }
                }

                treePositions.forEach(pos => {
                    const tree = this.walls.create(pos.x, pos.y, null);
                    tree.setSize(24, 28).setVisible(false);
                    // Desenhar árvore
                    this.mapGraphics.fillStyle(0x1a3a0a, 1);
                    this.mapGraphics.fillRect(pos.x - 10, pos.y - 4, 20, 24);
                    this.mapGraphics.fillStyle(0x2a5a1a, 1);
                    this.mapGraphics.fillRect(pos.x - 6, pos.y - 6, 16, 20);
                });
            }

            // ==================== NPC ====================
            spawnNPC(x, y, texture, id) {
                const npc = this.physics.add.sprite(x, y, texture);
                npc.setSize(20, 26).setOffset(6, 6).setDepth(8);
                npc.npcId = id;
                npc.dialogueIndex = 0;
                npc.nearPlayer = false;

                // Indicador visual
                const indicator = this.add.text(x, y - 22, '💬', {
                    fontSize: '14px',
                }).setOrigin(0.5).setDepth(9).setAlpha(0);
                npc.indicator = indicator;

                // Animação do indicador
                this.tweens.add({
                    targets: indicator,
                    y: y - 26,
                    alpha: 0.7,
                    duration: 1000,
                    yoyo: true,
                    repeat: -1,
                });

                this.npcs.add(npc);
                return npc;
            }

            onPlayerNearNPC(player, npc) {
                npc.nearPlayer = true;
                if (npc.indicator) {
                    npc.indicator.setAlpha(0.8);
                }
            }

            interactWithNPC() {
                const nearby = this.npcs.getChildren().find(npc => {
                    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, npc.x, npc.y);
                    return dist < 55 && npc.active;
                });

                if (nearby) {
                    this.triggerDialogue(nearby);
                }
            }

                    const dialogues = [{
                        speaker: 'Ancião da Vila',
                        text: 'Ah... você sobreviveu, jovem Kael.\nNós temíamos que os cavaleiros sombrios\ntivessem levado todos.',
                        choices: null,
                    }, {
                        speaker: 'Ancião da Vila',
                        text: 'Essa marca em seu braço... é a Marca das Cinzas.\nUma lenda antiga diz que o Herdeiro das Cinzas\nretornaria quando o mundo estivesse à beira do abismo.',
                        choices: [
                            { text: 'Conte-me tudo sobre essa lenda.', next: 2 },
                            { text: 'Não acredito em lendas. Preciso de vingança.', next: 3 },
                        ],
                    }, {
                        speaker: 'Ancião da Vila',
                        text: 'Há mil anos, os dragões dominavam os céus.\nOs humanos os exterminaram... mas uma profecia\nanunciou o retorno do último dragão.\n\nO Herdeiro das Cinzas deve escolher:\nsalvar os dragões ou destruí-los para sempre.',
                        choices: [
                            { text: 'Onde posso encontrar esse dragão?', next: 4 },
                            { text: 'Isso é loucura. Dragões são mitos.', next: -1 },
                        ],
                    }, {

                        choices: [
                            { text: 'Tem razão. O que devo fazer?', next: 2 },
                            { text: 'Minhas escolhas são minhas.', next: -1 },
                        ],
                    }, {
                        speaker: 'Ancião da Vila',
                        text: 'Viaje para o Norte Congelado.\nLá, nas ruínas de Drakenhold,\nos segredos dos antigos domadores de dragões\nainda estão enterrados sob o gelo.\n\nMas cuidado: nem todos querem ver os dragões retornarem.',
                        choices: [
                            { text: 'Irei para o norte. Obrigado, ancião.',
                                next: -1, reward: 'arthon_reputation' },
                            { text: 'Preciso me preparar primeiro.', next: -1 },
                        ],
                    }, ];

                    const idx = npc.dialogueIndex;
                    if (idx < dialogues.length) {
                        const d = dialogues[idx];
                        this.showDialog(d.speaker, d.text, () => {
                            if (d.choices) {
                                this.showChoices(d.choices, (choice) => {
                                    if (choice.reward === 'arthon_reputation') {

                                            '#ffcc00'
                                        );
                                    }
                                    npc.dialogueIndex = choice.next >= 0 ? choice.next :
                                        dialogues.length;
                                    if (choice.next >= 0 && choice.next < dialogues.length) {
                                        this.time.delayedCall(300, () => this
                                            .triggerDialogue(npc));

                            } else {
                                npc.dialogueIndex = idx + 1;
                            }
                        });
                    } else {
                        this.showDialog('Ancião da Vila',
                            'Que as cinzas te guiem, Herdeiro.\nO destino de Eldoria está em suas mãos.', null);

            showFloatingText(x, y, text, color) {

                    color: color || '#ffffff',
                    stroke: '#000',
                    strokeThickness: 3,
                }).setOrigin(0.5).setDepth(25);

                    targets: ft,
                    y: ft.y - 45,
                    alpha: 0,
                    duration: 1800,
                    onComplete: () => ft.destroy(),

            // ==================== DIÁLOGOS ====================
            showDialog(speaker, text, callback) {

                this.scene.launch('DialogScene', {
                    speaker,
                    text,
                    callback,
                    gameScene: this,
                    isChoice: false,
                });

                this.scene.launch('DialogScene', {

                log += '👑 Reputação entre Reinos:\n';
                for (const [realm, val] of Object.entries(GameState.reputation)) {

                }
                log += `\n💰 Ouro: ${GameState.gold}`;

                this.showDialog('Diário de Kael', log, () => this.scene.resume());

            // ==================== CONTROLES MOBILE ====================
            setupMobileControls() {
                // Joystick virtual
                this.joystickActive = false;
                this.joystickBasePos = { x: 75, y: 660 };
                this.mobileDirection = { x: 0, y: 0 };

                this.joystickBase = this.add.circle(
                    this.joystickBasePos.x, this.joystickBasePos.y,
                    42, 0x000000, 0.35
                ).setScrollFactor(0).setDepth(150).setInteractive();

                this.joystickThumb = this.add.circle(
                    this.joystickBasePos.x, this.joystickBasePos.y,
                    22, 0xffffff, 0.45
                ).setScrollFactor(0).setDepth(151);

                this.joystickBase.on('pointerdown', (pointer) => {
                    this.joystickActive = true;
                    this.joystickStart = { x: pointer.x, y: pointer.y };
                });

                this.input.on('pointermove', (pointer) => {
                    if (!this.joystickActive) return;
                    const dx = pointer.x - this.joystickStart.x;
                    const dy = pointer.y - this.joystickStart.y;
                    const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 38);
                    const angle = Math.atan2(dy, dx);
                    const tx = this.joystickStart.x + Math.cos(angle) * dist;
                    const ty = this.joystickStart.y + Math.sin(angle) * dist;
                    this.joystickThumb.setPosition(tx, ty);
                    this.mobileDirection = {
                        x: Math.cos(angle) * (dist / 38),
                        y: Math.sin(angle) * (dist / 38),
                    };
                });

                this.input.on('pointerup', () => {
                    this.joystickActive = false;
                    this.joystickThumb.setPosition(this.joystickBasePos.x, this.joystickBasePos.y);
                    this.mobileDirection = { x: 0, y: 0 };
                });

                // Botão de interação mobile
                const interactBtn = this.add.text(410, 690, '👆', {
                    fontSize: '26px',
                    backgroundColor: 'rgba(0,0,0,0.5)',
                    padding: { x: 12, y: 8 },
                }).setOrigin(0.5).setScrollFactor(0).setDepth(150).setInteractive();
                interactBtn.on('pointerdown', () => this.interactWithNPC());

                // Botão de missões mobile
                const questBtn = this.add.text(410, 630, '📜', {
                    fontSize: '22px',
                    backgroundColor: 'rgba(0,0,0,0.5)',
                    padding: { x: 10, y: 6 },
                }).setOrigin(0.5).setScrollFactor(0).setDepth(150).setInteractive();
                questBtn.on('pointerdown', () => this.showQuestLog());
            }

            // ==================== ILUMINAÇÃO ====================
            updateLighting() {
                this.lightOverlay.clear();
                this.lightOverlay.fillStyle(0x000000, 0.55);
                this.lightOverlay.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

                const sx = this.player.x - this.cameras.main.scrollX;
                const sy = this.player.y - this.cameras.main.scrollY;

                // Círculos concêntricos para gradiente de luz
                const circles = [
                    { r: 150, a: 0.48 },
                    { r: 120, a: 0.38 },
                    { r: 90, a: 0.25 },
                    { r: 55, a: 0.08 },
                ];

                circles.forEach(c => {
                    this.lightOverlay.fillStyle(0x000000, c.a);
                    this.lightOverlay.fillCircle(sx, sy, c.r);
                });
            }

            // ==================== UPDATE ====================
            update() {
                if (!this.player || !this.player.active) return;

                // Movimento
                let mx = 0,
                    my = 0;
                const speed = 130;

                if (this.joystickActive) {
                    mx = this.mobileDirection.x;
                    my = this.mobileDirection.y;
                } else {
                    if (this.cursors.left.isDown || this.wasd.left.isDown) mx = -1;
                    if (this.cursors.right.isDown || this.wasd.right.isDown) mx = 1;
                    if (this.cursors.up.isDown || this.wasd.up.isDown) my = -1;
                    if (this.cursors.down.isDown || this.wasd.down.isDown) my = 1;
                }

                // Normalizar diagonal
                if (mx !== 0 && my !== 0) {
                    mx *= 0.707;
                    my *= 0.707;
                }

                this.player.setVelocity(mx * speed, my * speed);
                this.player.isMoving = mx !== 0 || my !== 0;

                // Direção do jogador
                if (my < -0.1) this.player.direction = 'up';
                else if (my > 0.1) this.player.direction = 'down';
                else if (mx < -0.1) this.player.direction = 'left';
                else if (mx > 0.1) this.player.direction = 'right';

                // Trocar textura conforme direção
                if (this.player.isMoving) {
                    this.player.setTexture(`player_${this.player.direction}`);
                }

                // Regeneração de stamina
                if (this.player.stamina < this.player.maxStamina) {
                    this.player.stamina += 0.06;
                }

                // Iluminação
                this.updateLighting();

                // Atualizar indicadores de NPC
                this.npcs.getChildren().forEach(npc => {
                    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, npc.x, npc.y);
                    npc.nearPlayer = dist < 55;
                    if (npc.indicator) {
                        npc.indicator.setAlpha(npc.nearPlayer ? 0.8 : 0);
                    }
                });

                // Atualizar GameState
                GameState.playerHP = this.player.hp;
                GameState.playerStamina = Math.floor(this.player.stamina);
            }
        }

        // ==================== DIALOG SCENE ====================
        class DialogScene extends Phaser.Scene {
            constructor() { super('DialogScene'); }

            init(data) {
                this.speaker = data.speaker;
                this.text = data.text;
                this.callback = data.callback;
                this.gameScene = data.gameScene;
                this.choices = data.choices;
                this.choiceCallback = data.choiceCallback;
                this.isChoice = data.isChoice || false;
            }

            create() {
                const w = this.cameras.main.width;
                const h = this.cameras.main.height;

                // Overlay escuro
                const overlay = this.add.graphics();
                overlay.fillStyle(0x000000, 0.75);
                overlay.fillRect(0, 0, w, h);

                // Caixa de diálogo
                const boxW = w - 36;
                const boxH = 210;
                const boxX = 18;
                const boxY = h - boxH - 18;

                const box = this.add.graphics();
                box.fillStyle(0x1a1a1a, 0.97);
                box.fillRoundedRect(boxX, boxY, boxW, boxH, 14);
                box.lineStyle(3, 0xc9a84c, 0.9);
                box.strokeRoundedRect(boxX, boxY, boxW, boxH, 14);
                // Ornamento interno
                box.lineStyle(1, 0x8b0000, 0.5);
                box.strokeRoundedRect(boxX + 7, boxY + 7, boxW - 14, boxH - 14, 10);

                // Nome do falante
                const nameBg = this.add.graphics();
                nameBg.fillStyle(0x8b0000, 0.9);
                const nameW = this.speaker.length * 11 + 30;
                nameBg.fillRoundedRect(boxX + 18, boxY - 16, nameW, 30, 7);
                nameBg.lineStyle(2, 0xc9a84c, 0.85);
                nameBg.strokeRoundedRect(boxX + 18, boxY - 16, nameW, 30, 7);

                this.add.text(boxX + 33, boxY - 2, this.speaker, {
                    fontFamily: 'Georgia, serif',
                    fontSize: '17px',
                    color: '#ffcc00',
                    stroke: '#000',
                    strokeThickness: 3,
                });

                // Texto com typewriter
                const textObj = this.add.text(boxX + 22, boxY + 25, '', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '14px',
                    color: '#d4c48a',
                    stroke: '#000',
                    strokeThickness: 2,
                    wordWrap: { width: boxW - 44 },
                    lineSpacing: 5,
                });

                // Efeito typewriter
                let charIdx = 0;
                const fullText = this.text;
                const typewriter = this.time.addEvent({
                    delay: 22,
                    callback: () => {
                        charIdx++;
                        textObj.setText(fullText.substring(0, charIdx));
                        if (charIdx >= fullText.length) {
                            typewriter.remove();
                            this.showPrompt(boxX, boxY, boxW, boxH);
                        }
                    },
                    loop: true,
                });

                // Pular typewriter
                const skipText = () => {
                    if (charIdx < fullText.length) {
                        charIdx = fullText.length;
                        textObj.setText(fullText);
                        typewriter.remove();
                        this.showPrompt(boxX, boxY, boxW, boxH);
                    }
                };

                this.input.on('pointerdown', skipText);
                this.input.keyboard.on('keydown-SPACE', skipText);
                this.input.keyboard.on('keydown-ENTER', skipText);
            }

            showPrompt(boxX, boxY, boxW, boxH) {
                if (this.isChoice && this.choices) {
                    this.showChoicesUI(boxX, boxY, boxW, boxH);
                    return;
                }

                const prompt = this.add.text(
                    boxX + boxW - 35, boxY + boxH - 22,
                    '▶', {
                        fontFamily: 'Georgia, serif',
                        fontSize: '18px',
                        color: '#c9a84c',
                        stroke: '#000',
                        strokeThickness: 3,
                    }
                ).setOrigin(0.5).setInteractive({ useHandCursor: true });

                this.tweens.add({
                    targets: prompt,
                    alpha: 0.4,
                    duration: 600,
                    yoyo: true,
                    repeat: -1,
                });

                const advance = () => {
                    prompt.destroy();
                    this.closeDialog();
                };

                prompt.on('pointerdown', advance);
                this.input.keyboard.once('keydown-SPACE', advance);
                this.input.keyboard.once('keydown-ENTER', advance);
            }

            showChoicesUI(boxX, boxY, boxW, boxH) {
                const startY = boxY + 35;
                this.choices.forEach((choice, i) => {
                    const cy = startY + i * 45;
                    const btn = this.add.text(boxX + boxW / 2, cy, choice.text, {
                        fontFamily: 'Georgia, serif',
                        fontSize: '13px',
                        color: '#d4c48a',
                        stroke: '#000',
                        strokeThickness: 3,
                        backgroundColor: '#1a1a2a',
                        padding: { x: 16, y: 8 },
                    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

                    btn.on('pointerover', () => btn.setColor('#ffffff'));
                    btn.on('pointerout', () => btn.setColor('#d4c48a'));
                    btn.on('pointerdown', () => {
                        if (this.choiceCallback) this.choiceCallback(choice);
                        this.closeDialog();
                    });

                    // Borda da escolha
                    const border = this.add.graphics();
                    border.lineStyle(1, 0xc9a84c, 0.5);
                    border.strokeRoundedRect(
                        btn.x - btn.width / 2 - 10,
                        btn.y - btn.height / 2 - 6,
                        btn.width + 20,
                        btn.height + 12,
                        5
                    );
                });
            }

            closeDialog() {
                if (this.callback) this.callback();
                this.scene.stop();
                if (this.gameScene) this.gameScene.scene.resume();
            }
        }

        // ==================== INICIALIZAÇÃO ====================
        console.log('🔥 REINO DAS CINZAS - PASSO 1: FUNDAÇÃO');
        console.log('✅ Mapa com 5 biomas gerado');
        console.log('✅ Sistema de diálogo com typewriter');
        console.log('✅ NPC com quest e escolhas');
        console.log('✅ HUD com corações e stamina');
        console.log('✅ Controles mobile (joystick)');
        console.log('✅ Iluminação dinâmica');
        console.log('✅ Estrutura pronta para o Passo 2: Combate');
    </script>
</body>
</html>
