            onPlayerNearNPC(player, npc) { npc.nearPlayer = true; }

            interactWithNPC() {
                const nearby = this.npcs.getChildren().find(n => Phaser.Math.Distance.Between(this.player.x, this.player
                    .y, n.x, n.y) < 55 && n.active);
                if (nearby) this.triggerDialogue(nearby);
            }

            triggerDialogue(npc) {
                if (npc.npcId === 'aldeao_elder') {
                    const dialogues = [
                        { speaker: 'Ancião',
                            text: 'Vejo que está se fortalecendo, Herdeiro.\n\nUse a fogueira para salvar seu progresso e\ncraftar novos itens com materiais coletados.' },
                        { speaker: 'Ancião', text: 'Abra seu inventário (I) para equipar armas,\nusar poções e gerenciar seus pertences.\n\nItens raros podem mudar o rumo de uma batalha.' },
                        { speaker: 'Ancião',
                            text: 'Conforme sobe de nível, você ganha pontos\nde habilidade (T). Escolha com sabedoria.\n\nO destino de Eldoria está em suas mãos.' },
                    ];
                    const idx = npc.dialogueIndex;
                    if (idx < dialogues.length) {
                        this.showDialog(dialogues[idx].speaker, dialogues[idx].text, () => { npc.dialogueIndex = idx +
                            1; });
                    } else { this.showDialog('Ancião', 'Que as cinzas te guiem.', null); }
                }
            }

            playerAttack() {
                if (!this.player.alive || this.player.attackCooldown > 0 || this.player.isAttacking || this.player
                    .isDodging) return;
                if (this.player.stamina < 8) { this.showFloatingText(this.player.x, this.player.y - 25, 'Sem stamina!',
                        '#ff4444'); return; }
                this.player.isAttacking = true;
                this.player.attackCooldown = 25;
                this.player.stamina -= 8;
                const range = 38;
                let atkX = this.player.x,
                    atkY = this.player.y;
                switch (this.player.direction) { case 'up':
                        atkY -= range;
                        break;
                    case 'down':
                        atkY += range;
                        break;
                    case 'left':
                        atkX -= range;
                        break;
                    case 'right':
                        atkX += range;
                        break; }
                const slash = this.add.circle(atkX, atkY, 18, 0xffffff, 0.7).setDepth(12);
                this.tweens.add({ targets: slash, alpha: 0, scale: 1.8, duration: 180, onComplete: () => slash
                        .destroy() });
                const totalDamage = getTotalStat('strength') + getEquippedWeaponDamage();
                let hitSomething = false;
                this.enemies.getChildren().forEach(enemy => {
                    if (!enemy.active) return;
                    if (Phaser.Math.Distance.Between(atkX, atkY, enemy.x, enemy.y) < 35) { this.damageEnemy(enemy,
                            totalDamage);
                        hitSomething = true; }
                });
                if (hitSomething) this.cameras.main.shake(50, 0.003);
                this.time.delayedCall(200, () => { this.player.isAttacking = false; });
            }

            playerDodge() {
                if (!this.player.alive || this.player.isDodging || this.player.stamina < 18) {
                    if (this.player.stamina < 18) this.showFloatingText(this.player.x, this.player.y - 25,
                        'Sem stamina!', '#ff4444');
                    return;
                }
                this.player.isDodging = true;
                this.player.invulnerable = true;
                this.player.stamina -= 18;
                this.player.setAlpha(0.5);
                const dist = 55;
                let dx = 0,
                    dy = 0;
                switch (this.player.direction) { case 'up':
                        dy = -dist;
                        break;
                    case 'down':
                        dy = dist;
                        break;
                    case 'left':
                        dx = -dist;
                        break;
                    case 'right':
                        dx = dist;
                        break; }
                const dodgeParticles = this.add.particles(this.player.x, this.player.y, 'particle', { speed: { min: 40,
                        max: 100 }, scale: { start: 0.8, end: 0 }, lifespan: 300, quantity: 8, tint: [0x888888,
                        0xcccccc], emitting: false });
                dodgeParticles.explode(8);
                this.tweens.add({ targets: this.player, x: this.player.x + dx, y: this.player.y + dy, duration: 180,
                    ease: 'Power2' });
                this.time.delayedCall(400, () => { this.player.isDodging = false;
                    this.player.invulnerable = false;
                    this.player.setAlpha(1); });
            }

            damageEnemy(enemy, damage) {
                if (!enemy.active) return;
                enemy.hp -= damage;
                enemy.setTintFill(0xff4444);
                this.time.delayedCall(80, () => { if (enemy.active) enemy.clearTint(); });
                const angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                enemy.setVelocity(Math.cos(angle) * 120, Math.sin(angle) * 120);
                this.time.delayedCall(150, () => { if (enemy.active) enemy.setVelocity(0, 0); });
                const dmgText = this.add.text(enemy.x, enemy.y - 22, `-${damage}`, { fontFamily: 'Georgia, serif',
                    fontSize: '16px', color: '#ff4444', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5)
                    .setDepth(25);
                this.tweens.add({ targets: dmgText, y: dmgText.y - 35, alpha: 0, duration: 800, onComplete: () => dmgText
                        .destroy() });
                if (enemy.hp <= 0) this.killEnemy(enemy);
            }

            killEnemy(enemy) {
                const explosion = this.add.particles(enemy.x, enemy.y, 'particle', { speed: { min: 50, max: 150 },
                    scale: { start: 1.2, end: 0 }, lifespan: 600, quantity: 20, tint: [0xff4400, 0xff0000,
                        0xff8800, 0xffff00], emitting: false });
                explosion.explode(20);
                const dropChance = Math.random();
                if (dropChance < 0.55 && enemy.dropTable) {
                    const itemId = enemy.dropTable[Math.floor(Math.random() * enemy.dropTable.length)];
                    this.spawnDrop(enemy.x, enemy.y, itemId);
                } else if (dropChance < 0.70) { this.spawnDrop(enemy.x, enemy.y, 'gold'); }
                const xp = enemy.xpValue || 25;
                GameState.playerXP += xp;
                this.showFloatingText(enemy.x, enemy.y - 35, `+${xp} XP`, '#aaaaff');
                if (GameState.playerXP >= GameState.xpToNext) this.levelUp();
                enemy.destroy();
            }

            spawnDrop(x, y, itemId) {
                let texture = 'coin_icon';
                if (itemId === 'gold') texture = 'coin_icon';
                else if (itemId.includes('pocao')) texture = itemId.includes('green') ? 'potion_green' : 'potion_red';
                else if (itemId.includes('essencia')) texture = 'icon_essence';
                else texture = 'coin_icon';
                const drop = this.physics.add.sprite(x + Phaser.Math.Between(-10, 10), y + Phaser.Math.Between(-10, 10),
                    texture);
                drop.setDepth(5);
                drop.dropItemId = itemId;
                this.tweens.add({ targets: drop, alpha: 0.5, scale: 1.1, duration: 600, yoyo: true, repeat: -1 });
                this.drops.add(drop);
            }

            onPlayerCollectDrop(player, drop) {
                if (!drop.active) return;
                const itemId = drop.dropItemId;
                if (itemId === 'gold') {
                    const amount = Phaser.Math.Between(8, 35);
                    GameState.gold += amount;
                    this.showFloatingText(player.x, player.y - 20, `+${amount} ouro`, '#ffcc00');
                } else if (ItemDatabase[itemId]) {
                    addToInventory(itemId, 1);
                    this.showFloatingText(player.x, player.y - 20, `+${ItemDatabase[itemId].name}`, '#44ff44');
                }
                drop.destroy();
            }

            levelUp() {
                GameState.playerLevel++;
                GameState.playerXP -= GameState.xpToNext;
                GameState.xpToNext = Math.floor(GameState.xpToNext * 1.5);
                GameState.playerMaxHP += 1;
                GameState.playerHP = GameState.playerMaxHP;
                GameState.playerMaxStamina += 8;
                GameState.playerStamina = GameState.playerMaxStamina;
                GameState.playerStats.strength += 1;
                GameState.playerStats.agility += 1;
                GameState.skillPoints += 2;
                this.player.hp = GameState.playerHP;
                this.player.maxHp = GameState.playerMaxHP;
                this.player.stamina = GameState.playerStamina;
                this.player.maxStamina = GameState.playerMaxStamina;
                const lvlText = this.add.text(this.player.x, this.player.y - 45, '⬆ LEVEL UP! ⬆', { fontFamily: 'Georgia, serif',
                    fontSize: '22px', color: '#ffcc00', stroke: '#000', strokeThickness: 5 }).setOrigin(0.5).setDepth(
                    30);
                this.tweens.add({ targets: lvlText, y: lvlText.y - 60, alpha: 0, scale: 1.3, duration: 2000,
                    onComplete: () => lvlText.destroy() });
                const lvlParticles = this.add.particles(this.player.x, this.player.y, 'particle', { speed: { min: 30,
                        max: 100 }, scale: { start: 1.5, end: 0 }, lifespan: 1000, quantity: 25, tint: [0xffcc00,
                        0xffdd44, 0xffffff], emitting: false });
                lvlParticles.explode(25);
                this.showFloatingText(this.player.x, this.player.y - 60, '+2 Pontos de Habilidade!', '#ffcc00');
            }

            onPlayerHitEnemy(player, enemy) {
                if (player.invulnerable || !player.alive || !enemy.active) return;
                if (enemy.attackCooldown > 0) return;
                enemy.attackCooldown = 45;
                const rawDamage = enemy.damage || 1;
                const defense = getEquippedArmorDefense();
                const damage = Math.max(1, rawDamage - Math.floor(defense / 2));
                player.hp -= damage;
                GameState.playerHP = player.hp;
                player.invulnerable = true;
                player.setTintFill(0xff0000);
                const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
                player.setVelocity(Math.cos(angle) * 150, Math.sin(angle) * 150);
                this.showFloatingText(player.x, player.y - 25, `-${damage}`, '#ff0000');
                this.time.delayedCall(250, () => { if (player.active) player.setVelocity(0, 0); });
                this.time.delayedCall(700, () => { player.invulnerable = false;
                    player.clearTint(); });
                if (player.hp <= 0) this.playerDeath();
            }

            playerDeath() {
                this.player.alive = false;
                this.player.setVelocity(0, 0);
                this.player.setTintFill(0x333333);
                this.player.setAlpha(0.6);
                this.cameras.main.fadeOut(1200, 0, 0, 0);
                this.showDialog('Destino', 'Você caiu em batalha...\nMas as cinzas sempre encontram\num caminho de volta.',
                    () => {
                        this.player.setPosition(this.checkpointX, this.checkpointY);
                        this.player.hp = Math.ceil(this.player.maxHp / 2);
                        GameState.playerHP = this.player.hp;
                        this.player.alive = true;
                        this.player.clearTint();
                        this.player.setAlpha(1);
                        this.player.invulnerable = true;
                        this.cameras.main.fadeIn(1500, 0, 0, 0);
                        this.time.delayedCall(2000, () => { this.player.invulnerable = false; });
                    });
            }

            spawnEnemy(x, y, texture, config = {}) {
                const enemy = this.physics.add.sprite(x, y, texture);
                enemy.setSize(24, 28).setOffset(4, 4).setDepth(9);
                enemy.hp = config.hp || 3;
                enemy.maxHp = config.hp || 3;
                enemy.damage = config.damage || 1;
                enemy.speed = config.speed || 45;
                enemy.aggroRange = config.aggro || 160;
                enemy.attackCooldown = 0;
                enemy.xpValue = config.xpValue || 25;
                enemy.dropTable = config.dropTable || [];
                enemy.healthBar = this.add.graphics().setDepth(11);
                this.enemies.add(enemy);
                return enemy;
            }

            updateEnemyAI(enemy) {
                if (!enemy.active || !this.player.alive) return;
                const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                if (dist < enemy.aggroRange && dist > 28) {
                    const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, this.player.x, this.player.y);
                    enemy.setVelocity(Math.cos(angle) * enemy.speed, Math.sin(angle) * enemy.speed);
                } else if (dist <= 28 && enemy.attackCooldown <= 0) { enemy.setVelocity(0, 0); } else if (dist > enemy
                    .aggroRange) { enemy.setVelocity(0, 0); } else { enemy.setVelocity(0, 0); }
                if (enemy.healthBar) {
                    enemy.healthBar.clear();
                    const bw = 28,
                        bh = 4;
                    const hpPct = enemy.hp / enemy.maxHp;
                    enemy.healthBar.fillStyle(0x000000, 0.7);
                    enemy.healthBar.fillRect(enemy.x - bw / 2 - 1, enemy.y - 24, bw + 2, bh + 2);
                    enemy.healthBar.fillStyle(0xff0000, 0.9);
                    enemy.healthBar.fillRect(enemy.x - bw / 2, enemy.y - 23, bw * hpPct, bh);
                }
                if (enemy.attackCooldown > 0) enemy.attackCooldown--;
            }

            showDialog(speaker, text, callback) { this.scene.pause();
                this.scene.launch('DialogScene', { speaker, text, callback, gameScene: this, isChoice: false }); }

            showQuestLog() {
                let log = '📜 STATUS DE KAEL\n\n';
                log += `⚔️ Nível: ${GameState.playerLevel} (${GameState.playerXP}/${GameState.xpToNext} XP)\n`;
                log += `🌟 Pontos de Habilidade: ${GameState.skillPoints}\n`;
                log += `💰 Ouro: ${GameState.gold}\n\n`;
                log += '📊 ATRIBUTOS:\n';
                log += `💪 Força: ${getTotalStat('strength')}\n`;
                log += `🛡️ Defesa: ${getTotalStat('defense')}\n`;
                log += `💨 Agilidade: ${getTotalStat('agility')}\n`;
                log += `✨ Mana: ${getTotalStat('mana')}\n`;
                log += `🍀 Sorte: ${getTotalStat('luck')}\n\n`;
                log += '🎒 EQUIPAMENTOS:\n';

            showFloatingText(x, y, text, color) {
                const ft = this.add.text(x, y, text, { fontFamily: 'Georgia, serif', fontSize: '13px', color: color ||
                        '#ffffff', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5).setDepth(25);
                this.tweens.add({ targets: ft, y: ft.y - 40, alpha: 0, duration: 1500, onComplete: () => ft.destroy() });
            }

            setupMobileControls() {
                this.joystickActive = false;
                this.mobileDirection = { x: 0, y: 0 };
                this.joystickBase = this.add.circle(75, 660, 42, 0x000000, 0.35).setScrollFactor(0).setDepth(150)
                    .setInteractive();
                this.joystickThumb = this.add.circle(75, 660, 22, 0xffffff, 0.45).setScrollFactor(0).setDepth(151);
                this.joystickBase.on('pointerdown', (pointer) => { this.joystickActive = true;
                    this.joystickStart = { x: pointer.x, y: pointer.y }; });
                this.input.on('pointermove', (pointer) => {
                    if (!this.joystickActive) return;
                    const dx = pointer.x - this.joystickStart.x,
                        dy = pointer.y - this.joystickStart.y;
                    const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 38);
                    const angle = Math.atan2(dy, dx);
                    this.joystickThumb.setPosition(this.joystickStart.x + Math.cos(angle) * dist, this.joystickStart.y +
                        Math.sin(angle) * dist);
                    this.mobileDirection = { x: Math.cos(angle) * (dist / 38), y: Math.sin(angle) * (dist / 38) };
                });
                this.input.on('pointerup', () => { this.joystickActive = false;
                    this.joystickThumb.setPosition(75, 660);
                    this.mobileDirection = { x: 0, y: 0 }; });
                const btnBase = { fontSize: '22px', backgroundColor: 'rgba(0,0,0,0.6)', padding: { x: 10, y: 6 },
                    color: '#c9a84c' };
                const atkBtn = this.add.text(400, 640, '⚔️', btnBase).setOrigin(0.5).setScrollFactor(0).setDepth(150)
                    .setInteractive();
                atkBtn.on('pointerdown', () => this.playerAttack());
                const dodgeBtn = this.add.text(400, 690, '🌀', btnBase).setOrigin(0.5).setScrollFactor(0).setDepth(150)
                    .setInteractive();
                dodgeBtn.on('pointerdown', () => this.playerDodge());
                const invBtn = this.add.text(350, 720, '🎒', { ...btnBase, fontSize: '18px' }).setOrigin(0.5)
                    .setScrollFactor(0).setDepth(150).setInteractive();
                invBtn.on('pointerdown', () => { this.scene.pause();
                    this.scene.launch('InventoryScene', { gameScene: this }); });
                const craftBtn = this.add.text(450, 720, '🔨', { ...btnBase, fontSize: '18px' }).setOrigin(0.5)
                    .setScrollFactor(0).setDepth(150).setInteractive();
                craftBtn.on('pointerdown', () => {
                    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.checkpointX, this
                        .checkpointY);
                    if (dist < 70) { this.scene.pause();
                        this.scene.launch('CraftingScene', { gameScene: this }); } else { this.showFloatingText(this
                            .player.x, this.player.y - 20, 'Vá até a fogueira!', '#ffaa00'); }
                });
            }

            updateLighting() {
                this.lightOverlay.clear();
                this.lightOverlay.fillStyle(0x000000, 0.58);
                this.lightOverlay.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                const sx = this.player.x - this.cameras.main.scrollX;
                const sy = this.player.y - this.cameras.main.scrollY;
                [{ r: 155, a: 0.50 }, { r: 125, a: 0.40 }, { r: 95, a: 0.28 }, { r: 60, a: 0.10 }].forEach(c => {
                    this.lightOverlay.fillStyle(0x000000, c.a);
                    this.lightOverlay.fillCircle(sx, sy, c.r);
                });
            }

            updateMinimap() {
                this.minimapGraphics.clear();
                const mmX = GAME_WIDTH - 105,
                    mmY = 8,
                    mmW = 95,
                    mmH = 95;
                const scaleX = mmW / this.mapWidth,
                    scaleY = mmH / this.mapHeight;
                this.minimapGraphics.fillStyle(0x000000, 0.65);
                this.minimapGraphics.fillRoundedRect(mmX, mmY, mmW, mmH, 5);
                this.minimapGraphics.lineStyle(1, 0xc9a84c, 0.7);
                this.minimapGraphics.strokeRoundedRect(mmX, mmY, mmW, mmH, 5);
                const step = 10;
                for (let row = 0; row < this.tileMap.length; row += step) {
                    for (let col = 0; col < this.tileMap[row].length; col += step) {
                        const tile = this.tileMap[row][col];
                        let color = 0x2d5a27;
                        if (tile === 'water') color = 0x1a3a5a;
                        else if (tile === 'lava') color = 0x3a1a00;
                        else if (tile === 'snow') color = 0xddeeff;
                        else if (tile === 'path') color = 0x6b5a4a;
                        else if (tile === 'castle_floor') color = 0x4a3a2a;
                        this.minimapGraphics.fillStyle(color, 0.7);
                        this.minimapGraphics.fillRect(mmX + col * 32 * scaleX, mmY + row * 32 * scaleY, 32 * scaleX * step +
                            0.5, 32 * scaleY * step + 0.5);
                    }
                }
                const px = mmX + this.player.x * scaleX,
                    py = mmY + this.player.y * scaleY;
                this.minimapGraphics.fillStyle(0xffffff, 1);
                this.minimapGraphics.fillCircle(px, py, 2.5);
                this.enemies.getChildren().forEach(enemy => {
                    if (!enemy.active) return;
                    const ex = mmX + enemy.x * scaleX,
                        ey = mmY + enemy.y * scaleY;
                    this.minimapGraphics.fillStyle(0xff0000, 0.7);
                    this.minimapGraphics.fillRect(ex - 1, ey - 1, 2, 2);
                });
            }

            update() {
                if (!this.player || !this.player.active) return;
                let mx = 0,
                    my = 0;
                const speed = 130;
                if (this.joystickActive) { mx = this.mobileDirection.x;
                    my = this.mobileDirection.y; } else {
                    if (this.cursors.left.isDown || this.wasd.left.isDown) mx = -1;
                    if (this.cursors.right.isDown || this.wasd.right.isDown) mx = 1;
                    if (this.cursors.up.isDown || this.wasd.up.isDown) my = -1;
                    if (this.cursors.down.isDown || this.wasd.down.isDown) my = 1;
                }
                if (mx !== 0 && my !== 0) { mx *= 0.707;
                    my *= 0.707; }
                if (this.player.alive && !this.player.isDodging) this.player.setVelocity(mx * speed, my * speed);
                if (my < -0.1) this.player.direction = 'up';
                else if (my > 0.1) this.player.direction = 'down';
                else if (mx < -0.1) this.player.direction = 'left';
                else if (mx > 0.1) this.player.direction = 'right';
                if (this.player.attackCooldown > 0) this.player.attackCooldown--;
                if (this.player.stamina < this.player.maxStamina) this.player.stamina += 0.06;
                this.enemies.getChildren().forEach(e => this.updateEnemyAI(e));
                if (Phaser.Input.Keyboard.JustDown(this.attackKey)) this.playerAttack();
                if (Phaser.Input.Keyboard.JustDown(this.dodgeKey)) this.playerDodge();
                this.updateLighting();
                this.updateMinimap();
                this.npcs.getChildren().forEach(npc => {
                    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, npc.x, npc.y);
                    npc.nearPlayer = dist < 55;
                    if (npc.indicator) npc.indicator.setAlpha(npc.nearPlayer ? 0.8 : 0);
                });
                GameState.playerHP = this.player.hp;
                GameState.playerStamina = Math.floor(this.player.stamina);
            }
        }

        // ==================== HUD SCENE ====================
        class HudScene extends Phaser.Scene {
            constructor() { super('HudScene'); }
            init(data) { this.gameScene = data.gameScene; }
            create() {
                this.scene.bringToTop();
                const w = this.cameras.main.width;
                this.heartsContainer = this.add.container(10, 10);
                this.staminaBg = this.add.graphics();
                this.staminaBg.fillStyle(0x000000, 0.6);
                this.staminaBg.fillRoundedRect(10, 34, 104, 14, 3);
                this.staminaBg.lineStyle(1, 0xc9a84c, 0.6);
                this.staminaBg.strokeRoundedRect(10, 34, 104, 14, 3);
                this.staminaBar = this.add.graphics();
                this.staminaIcon = this.add.image(6, 41, 'stamina_icon').setOrigin(0, 0.5).setScale(0.9);
                this.levelText = this.add.text(w - 55, 10, '', { fontFamily: 'Georgia, serif', fontSize: '15px',
                    color: '#c9a84c', stroke: '#000', strokeThickness: 3 });
                this.goldText = this.add.text(w - 85, 32, '', { fontFamily: 'Georgia, serif', fontSize: '12px',
                    color: '#ffcc00', stroke: '#000', strokeThickness: 2 });
                this.xpBar = this.add.graphics();
                this.xpText = this.add.text(w / 2, GAME_HEIGHT - 12, '', { fontFamily: 'Georgia, serif', fontSize: '9px',
                    color: '#aaaaff', stroke: '#000', strokeThickness: 2 }).setOrigin(0.5);
                this.skillPtsText = this.add.text(w - 55, 55, '', { fontFamily: 'Georgia, serif', fontSize: '11px',
                    color: '#ffcc00', stroke: '#000', strokeThickness: 2 });
            }
            update() {
                if (!this.gameScene?.player) return;
                const player = this.gameScene.player;
                const w = this.cameras.main.width;
                this.heartsContainer.removeAll(true);
                for (let i = 0; i < player.maxHp; i++) {
                    const heart = this.add.image(8 + i * 18, 8, i < player.hp ? 'heart_full' : 'heart_empty').setOrigin(0,
                        0).setScale(1.15);
                    this.heartsContainer.add(heart);
                }
                this.staminaBar.clear();
                const sp = player.stamina / player.maxStamina;
                const color = sp > 0.5 ? 0x44aa44 : sp > 0.25 ? 0xaaaa44 : 0xaa4444;
                this.staminaBar.fillStyle(color, 0.9);
                this.staminaBar.fillRoundedRect(12, 36, 100 * sp, 10, 2);
                this.levelText.setText(`Nv.${GameState.playerLevel}`);
                this.goldText.setText(`💰 ${GameState.gold}`);
                this.skillPtsText.setText(GameState.skillPoints > 0 ? `🌟 ${GameState.skillPoints}` : '');
                this.xpBar.clear();
                const xpPct = GameState.playerXP / GameState.xpToNext;
                this.xpBar.fillStyle(0x222244, 0.7);
                this.xpBar.fillRoundedRect(w / 2 - 50, GAME_HEIGHT - 22, 100, 8, 3);
                this.xpBar.fillStyle(0x6666cc, 0.9);
                this.xpBar.fillRoundedRect(w / 2 - 50, GAME_HEIGHT - 22, 100 * xpPct, 8, 3);
                this.xpText.setText(`XP ${GameState.playerXP}/${GameState.xpToNext}`);
            }
        }

        // ==================== DIALOG SCENE ====================
        class DialogScene extends Phaser.Scene {
            constructor() { super('DialogScene'); }
            init(data) { this.speaker = data.speaker;
                this.text = data.text;
                this.callback = data.callback;
                this.gameScene = data.gameScene;
                this.isChoice = data.isChoice || false; }
            create() {
                const w = this.cameras.main.width,
                    h = this.cameras.main.height;
                const overlay = this.add.graphics();
                overlay.fillStyle(0x000000, 0.75);
                overlay.fillRect(0, 0, w, h);
                const boxW = w - 36,
                    boxH = 200,
                    boxX = 18,
                    boxY = h - boxH - 18;
                const box = this.add.graphics();
                box.fillStyle(0x1a1a1a, 0.97);
                box.fillRoundedRect(boxX, boxY, boxW, boxH, 14);
                box.lineStyle(3, 0xc9a84c, 0.9);
                box.strokeRoundedRect(boxX, boxY, boxW, boxH, 14);
                box.lineStyle(1, 0x8b0000, 0.5);
                box.strokeRoundedRect(boxX + 7, boxY + 7, boxW - 14, boxH - 14, 10);
                const nameBg = this.add.graphics();
                nameBg.fillStyle(0x8b0000, 0.9);
                const nameW = this.speaker.length * 11 + 30;
                nameBg.fillRoundedRect(boxX + 18, boxY - 16, nameW, 30, 7);
                nameBg.lineStyle(2, 0xc9a84c, 0.85);
                nameBg.strokeRoundedRect(boxX + 18, boxY - 16, nameW, 30, 7);
                this.add.text(boxX + 33, boxY - 2, this.speaker, { fontFamily: 'Georgia, serif', fontSize: '17px',
                    color: '#ffcc00', stroke: '#000', strokeThickness: 3 });
                const textObj = this.add.text(boxX + 22, boxY + 25, '', { fontFamily: 'Georgia, serif', fontSize: '14px',
                    color: '#d4c48a', stroke: '#000', strokeThickness: 2, wordWrap: { width: boxW - 44 },
                    lineSpacing: 5 });
                let charIdx = 0;
                const fullText = this.text;
                const typewriter = this.time.addEvent({ delay: 22, callback: () => { charIdx++;
                        textObj.setText(fullText.substring(0, charIdx)); if (charIdx >= fullText.length) { typewriter
                            .remove();
                        this.showPrompt(boxX, boxY, boxW, boxH); } }, loop: true });
                const skip = () => { if (charIdx < fullText.length) { charIdx = fullText.length;
                        textObj.setText(fullText);
                        typewriter.remove();
                        this.showPrompt(boxX, boxY, boxW, boxH); } };
                this.input.on('pointerdown', skip);
                this.input.keyboard.on('keydown-SPACE', skip);
                this.input.keyboard.on('keydown-ENTER', skip);
            }
            showPrompt(boxX, boxY, boxW, boxH) {
                const prompt = this.add.text(boxX + boxW - 35, boxY + boxH - 22, '▶', { fontFamily: 'Georgia, serif',
                    fontSize: '18px', color: '#c9a84c', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5)
                    .setInteractive({ useHandCursor: true });
                this.tweens.add({ targets: prompt, alpha: 0.4, duration: 600, yoyo: true, repeat: -1 });
                const advance = () => { prompt.destroy();
                    this.closeDialog(); };
                prompt.on('pointerdown', advance);
                this.input.keyboard.once('keydown-SPACE', advance);
                this.input.keyboard.once('keydown-ENTER', advance);
            }
            closeDialog() { if (this.callback) this.callback();
                this.scene.stop(); if (this.gameScene) this.gameScene.scene.resume(); }
        }

        // ==================== INVENTORY SCENE ====================
        class InventoryScene extends Phaser.Scene {
            constructor() { super('InventoryScene'); }
            init(data) { this.gameScene = data.gameScene; }
            create() {
                const w = this.cameras.main.width,
                    h = this.cameras.main.height;
                const overlay = this.add.graphics();
                overlay.fillStyle(0x000000, 0.85);
                overlay.fillRect(0, 0, w, h);
                const panelW = w - 30,
                    panelH = h - 90,
                    panelX = 15,
                    panelY = 35;
                const panel = this.add.graphics();
                panel.fillStyle(0x1a1a1a, 0.95);
                panel.fillRoundedRect(panelX, panelY, panelW, panelH, 12);
                panel.lineStyle(3, 0xc9a84c, 0.9);
                panel.strokeRoundedRect(panelX, panelY, panelW, panelH, 12);
                this.add.text(w / 2, panelY + 15, '🎒 INVENTÁRIO', { fontFamily: 'Georgia, serif', fontSize: '20px',
                    color: '#c9a84c', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5);
                this.add.text(panelX + 20, panelY + 45, `💰 Ouro: ${GameState.gold}`, { fontFamily: 'Georgia, serif',
                    fontSize: '13px', color: '#ffcc00' });
                this.add.text(panelX + 20, panelY + 62, `🗡️ Arma: ${GameState.equipment.weapon ? ItemDatabase[GameState.equipment.weapon]?.name || 'Nenhuma' : 'Nenhuma'}`, { fontFamily: 'Georgia, serif',
                    fontSize: '11px', color: '#cccccc' });
                this.add.text(panelX + 20, panelY + 78, `🛡️ Armadura: ${GameState.equipment.armor ? ItemDatabase[GameState.equipment.armor]?.name || 'Nenhuma' : 'Nenhuma'}`, { fontFamily: 'Georgia, serif',
                    fontSize: '11px', color: '#cccccc' });
                this.add.text(panelX + 20, panelY + 94, `💍 Acessório: ${GameState.equipment.accessory ? ItemDatabase[GameState.equipment.accessory]?.name || 'Nenhum' : 'Nenhum'}`, { fontFamily: 'Georgia, serif',
                    fontSize: '11px', color: '#cccccc' });
                const itemStartY = panelY + 115;
                const itemListHeight = panelH - 130;
                GameState.inventory.forEach((invItem, index) => {
                    const itemData = ItemDatabase[invItem.id];
                    if (!itemData) return;
                    const iy = itemStartY + index * 38;
                    if (iy > itemStartY + itemListHeight) return;
                    const itemBg = this.add.graphics();
                    const rarityColors = { 'comum': 0x666666, 'raro': 0x4488ff, 'épico': 0xaa44ff, 'lendário': 0xff8800 };
                    const rarityColor = rarityColors[itemData.rarity] || 0x666666;
                    itemBg.fillStyle(0x2a2a2a, 0.8);
                    itemBg.fillRoundedRect(panelX + 10, iy, panelW - 20, 34, 5);
                    itemBg.lineStyle(1, rarityColor, 0.7);
                    itemBg.strokeRoundedRect(panelX + 10, iy, panelW - 20, 34, 5);
                    const textColor = { 'comum': '#cccccc', 'raro': '#4488ff', 'épico': '#aa44ff', 'lendário': '#ff8800' };
                    this.add.text(panelX + 20, iy + 5, itemData.name, { fontFamily: 'Georgia, serif', fontSize: '12px',
                        color: textColor[itemData.rarity], stroke: '#000', strokeThickness: 2 });
                    let infoText = `${itemData.type} | Qtd: ${invItem.quantity}`;
                    if (itemData.damage) infoText += ` | Dano: ${itemData.damage}`;
                    if (itemData.defense) infoText += ` | Def: ${itemData.defense}`;
                    if (itemData.heal) infoText += ` | Cura: ${itemData.heal}`;
                    this.add.text(panelX + 20, iy + 20, infoText, { fontFamily: 'Georgia, serif', fontSize: '9px',
                        color: '#888888' });
                    if (itemData.type === 'potion') {
                        const useBtn = this.add.text(panelX + panelW - 50, iy + 8, 'Usar', { fontFamily: 'Georgia, serif',
                            fontSize: '11px', color: '#44ff44', stroke: '#000', strokeThickness: 2,
                            backgroundColor: '#1a3a1a', padding: { x: 6, y: 3 } }).setInteractive({ useHandCursor: true });
                        useBtn.on('pointerdown', () => {
                            if (this.gameScene?.player) {
                                const p = this.gameScene.player;
                                if (itemData.heal) { p.hp = Math.min(p.hp + itemData.heal, p.maxHp);
                                    GameState.playerHP = p.hp; }
                                if (itemData.staminaRestore) { p.stamina = Math.min(p.stamina + itemData
                                        .staminaRestore, p.maxStamina);
                                    GameState.playerStamina = Math.floor(p.stamina); }
                                removeFromInventory(invItem.id, 1);
                                this.scene.restart({ gameScene: this.gameScene });
                            }
                        });
                    }
                    if (itemData.type === 'weapon' && GameState.equipment.weapon !== invItem.id) {
                        const equipBtn = this.add.text(panelX + panelW - 60, iy + 8, 'Equipar', { fontFamily: 'Georgia, serif',
                            fontSize: '11px', color: '#ffcc00', stroke: '#000', strokeThickness: 2,
                            backgroundColor: '#3a3a1a', padding: { x: 6, y: 3 } }).setInteractive({ useHandCursor: true });
                        equipBtn.on('pointerdown', () => { GameState.equipment.weapon = invItem.id;
                            this.scene.restart({ gameScene: this.gameScene }); });
                    }
                    if (itemData.type === 'armor' && GameState.equipment.armor !== invItem.id) {
                        const equipBtn = this.add.text(panelX + panelW - 60, iy + 8, 'Vestir', { fontFamily: 'Georgia, serif',
                            fontSize: '11px', color: '#ffcc00', stroke: '#000', strokeThickness: 2,
                            backgroundColor: '#3a3a1a', padding: { x: 6, y: 3 } }).setInteractive({ useHandCursor: true });
                        equipBtn.on('pointerdown', () => { GameState.equipment.armor = invItem.id;
                            this.scene.restart({ gameScene: this.gameScene }); });
                    }
                    if (itemData.type === 'accessory' && GameState.equipment.accessory !== invItem.id) {
                        const equipBtn = this.add.text(panelX + panelW - 60, iy + 8, 'Usar', { fontFamily: 'Georgia, serif',
                            fontSize: '11px', color: '#ffcc00', stroke: '#000', strokeThickness: 2,
                            backgroundColor: '#3a3a1a', padding: { x: 6, y: 3 } }).setInteractive({ useHandCursor: true });
                        equipBtn.on('pointerdown', () => { GameState.equipment.accessory = invItem.id;
                            this.scene.restart({ gameScene: this.gameScene }); });
                    }
                });
                const closeBtn = this.add.text(w / 2, h - 30, '❌ FECHAR (I)', { fontFamily: 'Georgia, serif',
                    fontSize: '16px', color: '#cc4444', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5)
                    .setInteractive({ useHandCursor: true });
                closeBtn.on('pointerdown', () => { this.scene.stop(); if (this.gameScene) this.gameScene.scene.resume(); });
                this.input.keyboard.on('keydown-I', () => { this.scene.stop(); if (this.gameScene) this.gameScene.scene
                        .resume(); });
                this.input.keyboard.on('keydown-ESC', () => { this.scene.stop(); if (this.gameScene) this.gameScene.scene
                        .resume(); });
            }
        }

        // ==================== SKILL SCENE ====================
        class SkillScene extends Phaser.Scene {
            constructor() { super('SkillScene'); }
            init(data) { this.gameScene = data.gameScene; }
            create() {
                const w = this.cameras.main.width,
                    h = this.cameras.main.height;
                const overlay = this.add.graphics();
                overlay.fillStyle(0x000000, 0.85);
                overlay.fillRect(0, 0, w, h);
                const panelW = w - 30,
                    panelX = 15,
                    panelY = 50;
                const panel = this.add.graphics();
                panel.fillStyle(0x1a1a1a, 0.95);
                panel.fillRoundedRect(panelX, panelY, panelW, h - panelY - 40, 12);
                panel.lineStyle(3, 0xc9a84c, 0.9);
                panel.strokeRoundedRect(panelX, panelY, panelW, h - panelY - 40, 12);
                this.add.text(w / 2, panelY + 15, '🌟 HABILIDADES', { fontFamily: 'Georgia, serif', fontSize: '20px',
                    color: '#c9a84c', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5);
                this.add.text(w / 2, panelY + 40, `Pontos disponíveis: ${GameState.skillPoints}`, { fontFamily: 'Georgia, serif',
                    fontSize: '14px', color: '#ffcc00', stroke: '#000', strokeThickness: 2 }).setOrigin(0.5);
                const skills = [
                    { name: 'Força Bruta', stat: 'strength', desc: 'Aumenta o dano corpo a corpo', cost: 1,
                        icon: '💪' },
                    { name: 'Pele de Ferro', stat: 'defense', desc: 'Reduz o dano recebido', cost: 1, icon: '🛡️' },
                    { name: 'Passo Ligeiro', stat: 'agility', desc: 'Aumenta a velocidade de movimento', cost: 1,
                        icon: '💨' },
                    { name: 'Reserva Arcana', stat: 'mana', desc: 'Aumenta o mana máximo', cost: 1, icon: '✨' },
                    { name: 'Sombra da Sorte', stat: 'luck', desc: 'Melhores drops e críticos', cost: 2, icon: '🍀' },
                ];
                skills.forEach((skill, i) => {
                    const sy = panelY + 70 + i * 55;
                    const skillBg = this.add.graphics();
                    skillBg.fillStyle(0x2a2a2a, 0.8);
                    skillBg.fillRoundedRect(panelX + 10, sy, panelW - 20, 48, 6);
                    this.add.text(panelX + 25, sy + 5, `${skill.icon} ${skill.name}`, { fontFamily: 'Georgia, serif',
                        fontSize: '14px', color: '#d4c48a', stroke: '#000', strokeThickness: 2 });
                    this.add.text(panelX + 25, sy + 24,
                        `${skill.desc} | Custo: ${skill.cost} pt | Atual: ${getTotalStat(skill.stat)}`, {
                            fontFamily: 'Georgia, serif', fontSize: '10px', color: '#888888' });
                    if (GameState.skillPoints >= skill.cost) {
                        const upgradeBtn = this.add.text(panelX + panelW - 50, sy + 12, '+', { fontFamily: 'Georgia, serif',
                            fontSize: '18px', color: '#44ff44', stroke: '#000', strokeThickness: 3,
                            backgroundColor: '#1a3a1a', padding: { x: 8, y: 4 } }).setInteractive({ useHandCursor: true });
                        upgradeBtn.on('pointerdown', () => {
                            GameState.skillPoints -= skill.cost;
                            GameState.playerStats[skill.stat] += 1;
                            this.scene.restart({ gameScene: this.gameScene });
                        });
                    }
                });
                const closeBtn = this.add.text(w / 2, h - 25, '❌ FECHAR (T)', { fontFamily: 'Georgia, serif',
                    fontSize: '16px', color: '#cc4444', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5)
                    .setInteractive({ useHandCursor: true });
                closeBtn.on('pointerdown', () => { this.scene.stop(); if (this.gameScene) this.gameScene.scene.resume(); });
                this.input.keyboard.on('keydown-T', () => { this.scene.stop(); if (this.gameScene) this.gameScene.scene
                        .resume(); });
                this.input.keyboard.on('keydown-ESC', () => { this.scene.stop(); if (this.gameScene) this.gameScene.scene
                        .resume(); });

        }

        // ==================== CRAFTING SCENE ====================
        class CraftingScene extends Phaser.Scene {
            constructor() { super('CraftingScene'); }
            init(data) { this.gameScene = data.gameScene; }
            create() {
                const w = this.cameras.main.width,
                    h = this.cameras.main.height;
                const overlay = this.add.graphics();
                overlay.fillStyle(0x000000, 0.85);
                overlay.fillRect(0, 0, w, h);
                const panelW = w - 30,
                    panelX = 15,
                    panelY = 50;
                const panel = this.add.graphics();
                panel.fillStyle(0x1a1a1a, 0.95);
                panel.fillRoundedRect(panelX, panelY, panelW, h - panelY - 40, 12);
                panel.lineStyle(3, 0xc9a84c, 0.9);
                panel.strokeRoundedRect(panelX, panelY, panelW, h - panelY - 40, 12);
                this.add.text(w / 2, panelY + 15, '🔨 CRAFTING (Fogueira)', { fontFamily: 'Georgia, serif',
                    fontSize: '20px', color: '#c9a84c', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5);
                this.add.text(panelX + 20, panelY + 45, 'Receitas descobertas:', { fontFamily: 'Georgia, serif',
                    fontSize: '12px', color: '#aaaaaa' });
                CraftingRecipes.forEach((recipe, i) => {
                    if (!GameState.discoveredRecipes.includes(recipe.result)) return;
                    const ry = panelY + 70 + i * 70;
                    const recipeBg = this.add.graphics();
                    recipeBg.fillStyle(0x2a2a2a, 0.8);
                    recipeBg.fillRoundedRect(panelX + 10, ry, panelW - 20, 62, 6);
                    const resultData = ItemDatabase[recipe.result];
                    const textColor = { 'comum': '#cccccc', 'raro': '#4488ff', 'épico': '#aa44ff' };
                    this.add.text(panelX + 25, ry + 5, `→ ${recipe.description} (${resultData?.rarity || '?'})`, {
                        fontFamily: 'Georgia, serif', fontSize: '13px', color: textColor[resultData?.rarity] ||
                            '#cccccc', stroke: '#000', strokeThickness: 2 });
                    let matsText = 'Materiais: ';
                    recipe.materials.forEach((mat, mi) => {
                        const matData = ItemDatabase[mat];
                        const owned = countInInventory(mat);
                        matsText += `${matData?.name || mat} (${owned})${mi < recipe.materials.length - 1 ? ', ' : ''}`;
                    });
                    this.add.text(panelX + 25, ry + 22, matsText, { fontFamily: 'Georgia, serif', fontSize: '10px',
                        color: '#aaaaaa', wordWrap: { width: panelW - 60 } });
                    const canCraft = recipe.materials.every(mat => countInInventory(mat) >= 1);
                    if (canCraft) {
                        const craftBtn = this.add.text(panelX + panelW - 50, ry + 18, 'Criar', { fontFamily: 'Georgia, serif',
                            fontSize: '12px', color: '#44ff44', stroke: '#000', strokeThickness: 2,
                            backgroundColor: '#1a3a1a', padding: { x: 8, y: 4 } }).setInteractive({ useHandCursor: true });
                        craftBtn.on('pointerdown', () => {
                            recipe.materials.forEach(mat => removeFromInventory(mat, 1));
                            addToInventory(recipe.result, 1);
                            this.scene.restart({ gameScene: this.gameScene });
                        });
                    }
                });
                const saveBtn = this.add.text(w / 2, h - 80, '💾 SALVAR JOGO', { fontFamily: 'Georgia, serif',
                    fontSize: '16px', color: '#ffcc00', stroke: '#000', strokeThickness: 3,
                    backgroundColor: '#3a3a1a', padding: { x: 20, y: 8 } }).setOrigin(0.5).setInteractive({ useHandCursor: true });
                saveBtn.on('pointerdown', () => {
                    GameState.playerHP = this.gameScene.player.hp;
                    GameState.playerStamina = Math.floor(this.gameScene.player.stamina);
                    saveGame();
                    this.add.text(w / 2, h - 55, '✅ Jogo salvo!', { fontFamily: 'Georgia, serif', fontSize: '12px',
                        color: '#88ff88', stroke: '#000', strokeThickness: 2 }).setOrigin(0.5);
                    this.time.delayedCall(1500, () => this.scene.restart({ gameScene: this.gameScene }));
                });
                const closeBtn = this.add.text(w / 2, h - 25, '❌ FECHAR (C)', { fontFamily: 'Georgia, serif',
                    fontSize: '16px', color: '#cc4444', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5)
                    .setInteractive({ useHandCursor: true });
                closeBtn.on('pointerdown', () => { this.scene.stop(); if (this.gameScene) this.gameScene.scene.resume(); });
                this.input.keyboard.on('keydown-C', () => { this.scene.stop(); if (this.gameScene) this.gameScene.scene
                        .resume(); });
                this.input.keyboard.on('keydown-ESC', () => { this.scene.stop(); if (this.gameScene) this.gameScene.scene
                        .resume(); });
            }
        }

        console.log('🔥 REINO DAS CINZAS - PASSO 3: RPG & PROGRESSÃO');

        console.log('⚔️ Equipamentos afetam atributos e combate');
        console.log('🔨 Crafting de itens raros com materiais');
        console.log('✅ Pronto para o Passo 4: Mundo & Quests');
    </script>

    <script>
        // ============================================================
        // REINO DAS CINZAS - PASSO 4: MUNDO & QUESTS
        // ============================================================
        const GAME_WIDTH = 480;

        // ==================== BANCO DE DADOS EXPANDIDO ====================
        const ItemDatabase = {

                value: 90 },
            'essencia_fogo': { name: 'Essência de Fogo', type: 'crafting', rarity: 'raro', icon: 'essence', value: 50 },
            'essencia_gelo': { name: 'Essência de Gelo', type: 'crafting', rarity: 'raro', icon: 'essence', value: 50 },
            'ferro_bruto': { name: 'Ferro Bruto', type: 'crafting', rarity: 'comum', icon: 'ore', value: 10 },

        const CraftingRecipes = [

            { result: 'armadura_ferro', materials: ['armadura_couro', 'ferro_bruto', 'ferro_bruto'],

            { result: 'lamina_sombria', materials: ['espada_longa', 'essencia_fogo', 'essencia_gelo'],
                description: 'Lâmina Sombria' },
        ];

        // ==================== GAMESTATE EXPANDIDO ====================
        const GameState = {
            playerLevel: 1,
            playerXP: 0,
            xpToNext: 100,
            skillPoints: 0,
            playerStats: { strength: 5, defense: 3, agility: 4, mana: 10, luck: 2 },
            playerHP: 5,
            playerMaxHP: 5,
            playerStamina: 100,
            playerMaxStamina: 100,
            gold: 50,
            inventory: [
                { id: 'espada_curta', quantity: 1 },
                { id: 'pocao_vida', quantity: 3 },
                { id: 'couro', quantity: 2 },
                { id: 'mapa_eldoria', quantity: 1 },
            ],
            equipment: {
                weapon: 'espada_curta',
                armor: null,
                accessory: null,
            },
            reputation: { arthon: 10, korag: 0, eldryn: 0, north: 0, stormIsle: 0 },
            quests: {
                main: { id: 'main_01', step: 0, title: 'O Despertar das Cinzas', completed: false },
                side: [],
            },
            completedQuests: [],
            choices: { sparedVillage: null, executedKing: false, usedForbiddenMagic: false, freedDragons: false },
            currentRegion: 'arthon',
            gameTime: 0,
            dragonsDiscovered: 0,
            bossesDefeated: [],
            ending: null,
            discoveredRecipes: ['pocao_vida_grande'],
            lastSaveTime: null,
        };

        function getEquippedWeaponDamage() {
            const wpnId = GameState.equipment.weapon;
            if (wpnId && ItemDatabase[wpnId]) return ItemDatabase[wpnId].damage || 3;
            return 3;
        }

        function getEquippedArmorDefense() {
            const armId = GameState.equipment.armor;
            if (armId && ItemDatabase[armId]) return ItemDatabase[armId].defense || 0;
            return 0;
        }

        function getTotalStat(statName) {
            let total = GameState.playerStats[statName] || 0;
            ['weapon', 'armor', 'accessory'].forEach(slot => {
                const id = GameState.equipment[slot];
                if (id && ItemDatabase[id] && ItemDatabase[id][statName]) total += ItemDatabase[id][statName];
            });
            return total;
        }

        function addToInventory(itemId, qty = 1) {
            const existing = GameState.inventory.find(i => i.id === itemId);
            if (existing) existing.quantity += qty;
            else GameState.inventory.push({ id: itemId, quantity: qty });
        }

        function removeFromInventory(itemId, qty = 1) {
            const existing = GameState.inventory.find(i => i.id === itemId);
            if (!existing) return false;
            existing.quantity -= qty;
            if (existing.quantity <= 0) GameState.inventory = GameState.inventory.filter(i => i.id !== itemId);
            return true;
        }

        function countInInventory(itemId) {
            const existing = GameState.inventory.find(i => i.id === itemId);
            return existing ? existing.quantity : 0;
        }

        function saveGame() {
            GameState.lastSaveTime = Date.now();
            localStorage.setItem('reino_das_cinzas_save', JSON.stringify(GameState));
            return true;
        }

        function loadGame() {
            const saved = localStorage.getItem('reino_das_cinzas_save');
            if (saved) {
                try { Object.assign(GameState, JSON.parse(saved)); return true; } catch (e) { return false; }
            }
            return false;
        }

        // ==================== CONFIGURAÇÃO PHASER ====================
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: GAME_WIDTH,
            height: GAME_HEIGHT,
            pixelArt: true,
            roundPixels: true,
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: GAME_WIDTH,
                height: GAME_HEIGHT,
            },
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 0 }, debug: false },
            },
            scene: [BootScene, MenuScene, GameScene, HudScene, DialogScene, InventoryScene, SkillScene,
            CraftingScene, ShopScene, QuestLogScene],
            backgroundColor: '#0a0a0a',
            input: { activePointers: 3 },
        };

        const game = new Phaser.Game(config);

        // ==================== GERADOR DE TEXTURAS ====================
        function generateAllTextures(scene) {
            ['down', 'up', 'left', 'right'].forEach(dir => {
                const canvas = scene.textures.createCanvas(`player_${dir}`, 32, 32);
                const ctx = canvas.getContext();
                ctx.fillStyle = '#3a3a3a';
                ctx.fillRect(10, 6, 12, 18);
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(8, 24, 16, 8);
                ctx.fillStyle = '#ff6600';
                ctx.fillRect(6, 10, 3, 6);
                ctx.fillStyle = '#6b3a2a';
                ctx.fillRect(12, 2, 8, 6);
                ctx.fillStyle = '#8b0000';
                ctx.fillRect(14, 4, 2, 2);
                ctx.fillRect(18, 4, 2, 2);
                ctx.fillStyle = '#c9a84c';
                ctx.fillRect(10, 8, 4, 4);
                canvas.refresh();
            });
            const atkCanvas = scene.textures.createCanvas('player_attack', 32, 32);
            const aCtx = atkCanvas.getContext();
            aCtx.drawImage(scene.textures.get('player_down').getCanvas(), 0, 0);
            aCtx.fillStyle = '#ffffff';
            aCtx.fillRect(22, 12, 10, 3);
            atkCanvas.refresh();
            const npcCanvas = scene.textures.createCanvas('npc_villager', 32, 32);
            const nCtx = npcCanvas.getContext();
            nCtx.fillStyle = '#5a4a3a';
            nCtx.fillRect(10, 6, 12, 16);
            nCtx.fillStyle = '#3a2a1a';
            nCtx.fillRect(8, 22, 16, 10);
            nCtx.fillStyle = '#d4a574';
            nCtx.fillRect(12, 2, 8, 6);
            nCtx.fillStyle = '#3366cc';
            nCtx.fillRect(14, 4, 2, 2);
            nCtx.fillRect(18, 4, 2, 2);
            npcCanvas.refresh();
            const enemyCanvas = scene.textures.createCanvas('enemy_darkknight', 32, 32);
            const eCtx = enemyCanvas.getContext();
            eCtx.fillStyle = '#1a1a2e';
            eCtx.fillRect(8, 4, 16, 20);
            eCtx.fillStyle = '#0d0d1a';
            eCtx.fillRect(6, 24, 20, 8);
            eCtx.fillStyle = '#4a0000';
            eCtx.fillRect(12, 0, 8, 6);
            eCtx.fillStyle = '#ff0000';
            eCtx.fillRect(14, 2, 3, 2);
            eCtx.fillRect(18, 2, 3, 2);
            enemyCanvas.refresh();
            const wolfCanvas = scene.textures.createCanvas('enemy_wolf', 32, 24);
            const wCtx = wolfCanvas.getContext();
            wCtx.fillStyle = '#2a2a2a';
            wCtx.fillRect(4, 8, 24, 12);
            wCtx.fillStyle = '#1a1a1a';
            wCtx.fillRect(2, 4, 10, 8);
            wCtx.fillStyle = '#ff4400';
            wCtx.fillRect(0, 6, 4, 3);
            wolfCanvas.refresh();
            const tileDefs = {
                'grass': { base: '#2d5a27', accent: '#3a6b30' },
                'grass_dark': { base: '#1a3d14', accent: '#224a1c' },
                'path': { base: '#6b5a4a', accent: '#7a6a5a' },
                'stone': { base: '#5a5a5a', accent: '#6a6a6a' },
                'water': { base: '#1a3a5a', accent: '#2a5a8a' },
                'lava': { base: '#3a1a00', accent: '#5a2a00' },
                'snow': { base: '#ddeeff', accent: '#ffffff' },
                'castle_floor': { base: '#4a3a2a', accent: '#5a4a3a' },
            };
            for (const [name, cols] of Object.entries(tileDefs)) {
                const tCanvas = scene.textures.createCanvas(`tile_${name}`, 32, 32);
                const tCtx = tCanvas.getContext();
                tCtx.fillStyle = cols.base;
                tCtx.fillRect(0, 0, 32, 32);
                tCtx.fillStyle = cols.accent;
                for (let i = 0; i < 4; i++) tCtx.fillRect(Math.floor(Math.random() * 24) + 4, Math.floor(Math.random() *
                    24) + 4, 2, 2);
                tCanvas.refresh();
            }
            const hfCanvas = scene.textures.createCanvas('heart_full', 16, 16);
            const hfCtx = hfCanvas.getContext();
            hfCtx.fillStyle = '#cc0000';
            hfCtx.fillRect(4, 3, 8, 10);
            hfCtx.fillRect(2, 5, 4, 6);
            hfCtx.fillRect(10, 5, 4, 6);
            hfCanvas.refresh();
            const heCanvas = scene.textures.createCanvas('heart_empty', 16, 16);
            const heCtx = heCanvas.getContext();
            heCtx.fillStyle = '#2a2a2a';
            heCtx.fillRect(4, 3, 8, 10);
            heCtx.fillRect(2, 5, 4, 6);
            heCtx.fillRect(10, 5, 4, 6);
            heCanvas.refresh();
            const stamCanvas = scene.textures.createCanvas('stamina_icon', 12, 12);
            const sCtx = stamCanvas.getContext();
            sCtx.fillStyle = '#44aa44';
            sCtx.fillRect(2, 2, 8, 8);
            stamCanvas.refresh();
            const partCanvas = scene.textures.createCanvas('particle', 4, 4);
            const pCtx = partCanvas.getContext();
            pCtx.fillStyle = '#ffffff';
            pCtx.fillRect(0, 0, 4, 4);
            partCanvas.refresh();
            const coinCanvas = scene.textures.createCanvas('coin_icon', 12, 12);
            const cCtx = coinCanvas.getContext();
            cCtx.fillStyle = '#cc9900';
            cCtx.fillRect(3, 2, 6, 8);
            cCtx.fillStyle = '#ffcc00';
            cCtx.fillRect(4, 3, 4, 2);
            coinCanvas.refresh();
            const potCanvas = scene.textures.createCanvas('potion_red', 10, 14);
            const potCtx = potCanvas.getContext();
            potCtx.fillStyle = '#cc2244';
            potCtx.fillRect(2, 4, 6, 8);

            const bonfCanvas = scene.textures.createCanvas('bonfire', 24, 28);

            bonfCtx.fillRect(4, 14, 4, 14);
            bonfCtx.fillRect(16, 14, 4, 14);
            bonfCtx.fillStyle = '#ff6600';
            bonfCtx.fillRect(6, 4, 6, 10);
            bonfCanvas.refresh();
            console.log('✅ [Passo 4] Texturas expandidas');
        }

        // ==================== BOOT SCENE ====================
        class BootScene extends Phaser.Scene {
            constructor() { super('BootScene'); }
            preload() {
                const w = this.cameras.main.width,
                    h = this.cameras.main.height;
                const barW = 300,
                    barH = 20,
                    barX = (w - barW) / 2,
                    barY = h / 2;
                const bg = this.add.graphics();
                bg.fillGradientStyle(0x0a0a0a, 0x0a0a0a, 0x1a0a0a, 0x1a0a0a, 1);
                bg.fillRect(0, 0, w, h);
                const titleText = this.add.text(w / 2, barY - 70, 'REINO DAS CINZAS', { fontFamily: 'Georgia, serif',
                    fontSize: '28px', color: '#c9a84c', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5)
                    .setAlpha(0);
                this.tweens.add({ targets: titleText, alpha: 1, duration: 800 });
                const progressBox = this.add.graphics();
                progressBox.fillStyle(0x1a1a1a, 0.8);
                progressBox.fillRect(barX - 4, barY - 4, barW + 8, barH + 8);
                progressBox.lineStyle(2, 0xc9a84c, 0.8);
                progressBox.strokeRect(barX - 4, barY - 4, barW + 8, barH + 8);
                const loadingBar = this.add.graphics();
                const loadingText = this.add.text(w / 2, barY + 30, 'Tecendo os reinos...', { fontFamily: 'Georgia, serif',
                    fontSize: '14px', color: '#8a8a8a' }).setOrigin(0.5);
                this.load.on('progress', (value) => { loadingBar.clear();
                    loadingBar.fillStyle(0xc9a84c, 1);
                    loadingBar.fillRect(barX, barY, barW * value, barH); });
                this.load.on('complete', () => { loadingBar.destroy();
                    progressBox.destroy();
                    loadingText.destroy();
                    titleText.destroy();
                    bg.destroy(); });
                generateAllTextures(this);
                for (let i = 0; i < 15; i++) this.load.image(`dummy_${i}`,
                    'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=='
                    );
            }
            create() {
                loadGame();
                this.time.delayedCall(600, () => {
                    this.cameras.main.fadeOut(500, 0, 0, 0);
                    this.time.delayedCall(500, () => this.scene.start('MenuScene'));
                });
            }
        }

        // ==================== MENU SCENE ====================
        class MenuScene extends Phaser.Scene {
            constructor() { super('MenuScene'); }
            create() {
                const w = this.cameras.main.width,
                    h = this.cameras.main.height;
                this.cameras.main.fadeIn(1500, 0, 0, 0);
                const bg = this.add.graphics();
                bg.fillGradientStyle(0x0a0a0a, 0x0a0a0a, 0x1a0a0a, 0x1a0a0a, 1);
                bg.fillRect(0, 0, w, h);
                for (let i = 0; i < 35; i++) {
                    const ash = this.add.circle(Phaser.Math.Between(0, w), Phaser.Math.Between(h * 0.3, h + 50), Phaser
                        .Math.Between(1, 3), 0x888888, Phaser.Math.FloatBetween(0.15, 0.5));
                    this.tweens.add({
                        targets: ash,
                        y: ash.y - Phaser.Math.Between(60, 250),
                        x: ash.x + Phaser.Math.Between(-40, 40),
                        alpha: 0,
                        duration: Phaser.Math.Between(4000, 10000),
                        repeat: -1,
                        delay: Phaser.Math.Between(0, 6000),
                        onRepeat: () => { ash.y = h + 20;
                            ash.x = Phaser.Math.Between(0, w);
                            ash.alpha = Phaser.Math.FloatBetween(0.15, 0.5); },
                    });
                }
                const title = this.add.text(w / 2, h * 0.16, 'REINO\nDAS\nCINZAS', { fontFamily: 'Georgia, serif',
                    fontSize: '56px', color: '#c9a84c', stroke: '#000000', strokeThickness: 10, align: 'center',
                    lineSpacing: 6 }).setOrigin(0.5);
                this.tweens.add({ targets: title, alpha: 0.75, scale: 1.02, duration: 2500, yoyo: true, repeat: -1,
                    ease: 'Sine.easeInOut' });
                this.add.text(w / 2, h * 0.36, 'O Herdeiro das Cinzas', { fontFamily: 'Georgia, serif', fontSize: '18px',
                    color: '#8b0000', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5);
                const createBtn = (y, text, onClick, enabled = true) => {
                    const btn = this.add.text(w / 2, y, text, { fontFamily: 'Georgia, serif', fontSize: '20px',
                        color: enabled ? '#d4c48a' : '#444444', stroke: '#000', strokeThickness: 4 }).setOrigin(
                        0.5).setInteractive({ useHandCursor: enabled });
                    if (enabled) {
                        btn.on('pointerover', () => btn.setColor('#ffffff'));
                        btn.on('pointerout', () => btn.setColor('#d4c48a'));
                        btn.on('pointerdown', onClick);
                    }
                    const border = this.add.graphics();
                    border.lineStyle(2, enabled ? 0xc9a84c : 0x333333, enabled ? 0.8 : 0.3);
                    border.strokeRoundedRect(btn.x - btn.width / 2 - 25, btn.y - btn.height / 2 - 10, btn.width + 50, btn
                        .height + 20, 8);
                };
                createBtn(h * 0.48, '🔱  INICIAR JORNADA', () => {
                    this.cameras.main.fadeOut(1200, 0, 0, 0);
                    this.time.delayedCall(1200, () => this.scene.start('GameScene'));
                });
                const hasSave = !!localStorage.getItem('reino_das_cinzas_save');
                createBtn(h * 0.58, '📜  CONTINUAR', () => {
                    this.cameras.main.fadeOut(1000, 0, 0, 0);
                    this.time.delayedCall(1000, () => this.scene.start('GameScene'));
                }, hasSave);
                this.add.text(w / 2, h * 0.78, 'PASSO 4: MUNDO & QUESTS\n5 Reinos · NPCs · Lojas · Escolhas', {
                    fontFamily: 'Georgia, serif',
                    fontSize: '10px',
                    color: '#555555',
                    align: 'center',
                    lineSpacing: 4,
                }).setOrigin(0.5);
            }
        }

        // ==================== GAME SCENE (EXPANDIDA COM REGIÕES) ====================
        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }
            create() {
                this.cameras.main.fadeIn(1500, 0, 0, 0);
                this.mapWidth = 4000;
                this.mapHeight = 4000;
                this.physics.world.setBounds(0, 0, this.mapWidth, this.mapHeight);
                this.tileMap = [];
                this.mapGraphics = this.add.graphics();
                this.generateWorldMap();
                this.walls = this.physics.add.staticGroup();
                this.npcs = this.physics.add.group();
                this.enemies = this.physics.add.group();
                this.drops = this.physics.add.group();
                this.portals = this.physics.add.group();
                this.spawnColliders();
                this.spawnRegionPortals();
                this.player = this.physics.add.sprite(400, 500, 'player_down');
                this.player.setCollideWorldBounds(true).setSize(20, 28).setOffset(6, 4).setDepth(10);
                this.player.hp = GameState.playerHP;
                this.player.maxHp = GameState.playerMaxHP;
                this.player.stamina = GameState.playerStamina;
                this.player.maxStamina = GameState.playerMaxStamina;
                this.player.direction = 'down';
                this.player.isAttacking = false;
                this.player.attackCooldown = 0;
                this.player.invulnerable = false;
                this.player.isDodging = false;
                this.player.alive = true;
                this.checkpointX = 400;
                this.checkpointY = 500;
                this.spawnBonfire(400, 500);
                this.physics.add.collider(this.player, this.walls);
                this.physics.add.collider(this.enemies, this.walls);
                this.physics.add.collider(this.enemies, this.enemies);
                this.physics.add.overlap(this.player, this.enemies, this.onPlayerHitEnemy, null, this);
                this.physics.add.overlap(this.player, this.drops, this.onPlayerCollectDrop, null, this);
                this.physics.add.overlap(this.player, this.npcs, this.onPlayerNearNPC, null, this);
                this.physics.add.overlap(this.player, this.portals, this.onPlayerEnterPortal, null, this);
                this.cameras.main.setBounds(0, 0, this.mapWidth, this.mapHeight);
                this.cameras.main.startFollow(this.player, true, 0.12, 0.12);
                this.lightOverlay = this.add.graphics().setDepth(90).setScrollFactor(0);
                this.minimapGraphics = this.add.graphics().setDepth(200).setScrollFactor(0);
                this.scene.launch('HudScene', { gameScene: this });
                this.spawnRegionNPCs();
                this.spawnRegionEnemies();
                this.cursors = this.input.keyboard.createCursorKeys();
                this.wasd = { up: this.input.keyboard.addKey('W'), down: this.input.keyboard.addKey('S'),
                    left: this.input.keyboard.addKey('A'), right: this.input.keyboard.addKey('D') };
                this.attackKey = this.input.keyboard.addKey('J');
                this.dodgeKey = this.input.keyboard.addKey('K');
                this.interactKey = this.input.keyboard.addKey('E');
                this.questKey = this.input.keyboard.addKey('Q');

            generateWorldMap() {
                const g = this.mapGraphics;
                const ts = 32;
                const cols = Math.ceil(this.mapWidth / ts);
                const rows = Math.ceil(this.mapHeight / ts);
                this.tileMap = [];
                for (let row = 0; row < rows; row++) {
                    this.tileMap[row] = [];
                    for (let col = 0; col < cols; col++) {
                        const wx = col * ts,
                            wy = row * ts;
                        let tile = 'grass';
                        const region = this.getRegionAt(wx, wy);
                        if (region === 'arthon') tile = 'grass';
                        else if (region === 'korag') tile = 'lava';
                        else if (region === 'eldryn') tile = 'grass_dark';
                        else if (region === 'north') tile = 'snow';
                        else if (region === 'stormIsle') tile = 'stone';
                        else if (region === 'border') tile = 'water';
                        if (region === 'arthon' && Math.abs(wx - 480) < 40 && wy > 250 && wy < 800) tile = 'path';
                        if (region === 'arthon' && wx > 550 && wx < 750 && wy > 350 && wy < 550) tile = 'castle_floor';
                        this.tileMap[row][col] = tile;
                        const colors = { 'grass': 0x2d5a27, 'grass_dark': 0x1a3d14, 'path': 0x6b5a4a, 'stone': 0x5a5a5a,
                            'water': 0x1a3a5a, 'lava': 0x3a1a00, 'snow': 0xddeeff, 'castle_floor': 0x4a3a2a };
                        g.fillStyle(colors[tile] || 0x2d5a27, 1);
                        g.fillRect(wx, wy, ts, ts);
                    }
                }
            }

            getRegionAt(wx, wy) {
                if (wx > 200 && wx < 1400 && wy > 200 && wy < 1200) return 'arthon';
                if (wx > 1600 && wx < 2800 && wy > 300 && wy < 1200) return 'korag';
                if (wx < 200 && wy > 200 && wy < 1400) return 'eldryn';
                if (wy < 200 && wx > 300 && wx < 2000) return 'north';
                if (wy > 1600 && wx > 500 && wx < 2000) return 'stormIsle';
                return 'border';
            }

            spawnEnemy(x, y, texture, config = {}) {
                const enemy = this.physics.add.sprite(x, y, texture);
                enemy.setSize(24, 28).setOffset(4, 4).setDepth(9);
                enemy.hp = config.hp || 3;
                enemy.maxHp = config.hp || 3;
                enemy.damage = config.damage || 1;
                enemy.speed = config.speed || 45;
                enemy.aggroRange = config.aggro || 160;
                enemy.attackCooldown = 0;
                enemy.xpValue = config.xpValue || 25;
                enemy.dropTable = config.dropTable || [];
                enemy.healthBar = this.add.graphics().setDepth(11);
                enemy.region = this.getRegionAt(x, y);
                this.enemies.add(enemy);
                return enemy;
            }

            killEnemy(enemy) {
                const explosion = this.add.particles(enemy.x, enemy.y, 'particle', { speed: { min: 50, max: 150 },
                    scale: { start: 1.2, end: 0 }, lifespan: 600, quantity: 20, tint: [0xff4400, 0xff0000,
                        0xff8800, 0xffff00], emitting: false });
                explosion.explode(20);
                if (Math.random() < 0.5 && enemy.dropTable) {
                    const itemId = enemy.dropTable[Math.floor(Math.random() * enemy.dropTable.length)];
                    this.spawnDrop(enemy.x, enemy.y, itemId);
                } else if (Math.random() < 0.7) this.spawnDrop(enemy.x, enemy.y, 'gold');
                GameState.playerXP += enemy.xpValue || 25;
                if (enemy.region === 'north') this.enemiesDefeatedInNorth = (this.enemiesDefeatedInNorth || 0) + 1;
                if (GameState.playerXP >= GameState.xpToNext) this.levelUp();
                enemy.destroy();
            }

            spawnDrop(x, y, itemId) {
                let texture = 'coin_icon';
                if (itemId.includes('pocao')) texture = 'potion_red';
                else if (itemId.includes('essencia')) texture = 'coin_icon';
                const drop = this.physics.add.sprite(x, y, texture);
                drop.setDepth(5);
                drop.dropItemId = itemId;
                this.tweens.add({ targets: drop, alpha: 0.5, scale: 1.1, duration: 600, yoyo: true, repeat: -1 });
                this.drops.add(drop);
            }

            onPlayerCollectDrop(player, drop) {
                if (!drop.active) return;
                if (drop.dropItemId === 'gold') {
                    const amount = Phaser.Math.Between(8, 35);

                    this.showFloatingText(player.x, player.y - 20, `+${amount} ouro`, '#ffcc00');

                    addToInventory(drop.dropItemId, 1);
                    this.showFloatingText(player.x, player.y - 20, `+${ItemDatabase[drop.dropItemId].name}`, '#44ff44');
                }
                drop.destroy();
            }

            levelUp() {
                GameState.playerLevel++;
                GameState.playerXP -= GameState.xpToNext;
                GameState.xpToNext = Math.floor(GameState.xpToNext * 1.5);
                GameState.playerMaxHP += 1;
                GameState.playerHP = GameState.playerMaxHP;
                GameState.playerMaxStamina += 8;
                GameState.playerStamina = GameState.playerMaxStamina;
                GameState.playerStats.strength += 1;
                GameState.playerStats.agility += 1;
                GameState.skillPoints += 2;
                this.player.hp = GameState.playerHP;

            update() {
                if (!this.player || !this.player.active) return;
                let mx = 0,
                    my = 0;
                const speed = 130;
                if (this.joystickActive) { mx = this.mobileDirection.x;
                    my = this.mobileDirection.y; } else {
                    if (this.cursors.left.isDown || this.wasd.left.isDown) mx = -1;
                    if (this.cursors.right.isDown || this.wasd.right.isDown) mx = 1;
                    if (this.cursors.up.isDown || this.wasd.up.isDown) my = -1;
                    if (this.cursors.down.isDown || this.wasd.down.isDown) my = 1;
                }
                if (mx !== 0 && my !== 0) { mx *= 0.707;
                    my *= 0.707; }
                if (this.player.alive && !this.player.isDodging) this.player.setVelocity(mx * speed, my * speed);
                if (my < -0.1) this.player.direction = 'up';
                else if (my > 0.1) this.player.direction = 'down';
                else if (mx < -0.1) this.player.direction = 'left';
                else if (mx > 0.1) this.player.direction = 'right';
                if (this.player.attackCooldown > 0) this.player.attackCooldown--;
                if (this.player.stamina < this.player.maxStamina) this.player.stamina += 0.06;
                this.enemies.getChildren().forEach(e => this.updateEnemyAI(e));
                if (Phaser.Input.Keyboard.JustDown(this.attackKey)) this.playerAttack();
                if (Phaser.Input.Keyboard.JustDown(this.dodgeKey)) this.playerDodge();
                this.updateLighting();
                this.updateMinimap();
                GameState.playerHP = this.player.hp;
                GameState.playerStamina = Math.floor(this.player.stamina);
            }

            showDialog(speaker, text, callback) { this.scene.pause();
                this.scene.launch('DialogScene', { speaker, text, callback, gameScene: this }); }
        }
