<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REINO DAS CINZAS</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; width:100vw; height:100vh; overflow:hidden; touch-action:none; }
        #game-container { width:100%; height:100%; max-width:900px; max-height:1600px; aspect-ratio:9/16; border:2px solid #2a1f0a; border-radius:4px; overflow:hidden; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script>
        // ==================== REINO DAS CINZAS - VERSÃO COMPLETA ====================
        const GAME_WIDTH = 480;
        const GAME_HEIGHT = 800;

        // Banco de Dados
        const ItemDatabase = {
            'espada_curta': { name: 'Espada Curta', type: 'weapon', damage: 5, rarity: 'comum', value: 25 },
            'espada_longa': { name: 'Espada Longa', type: 'weapon', damage: 8, rarity: 'raro', value: 80 },
            'lamina_sombria': { name: 'Lâmina Sombria', type: 'weapon', damage: 14, rarity: 'épico', value: 300 },
            'pocao_vida': { name: 'Poção de Vida', type: 'potion', heal: 2, rarity: 'comum', value: 15 },
            'pocao_vida_grande': { name: 'Poção de Vida Grande', type: 'potion', heal: 5, rarity: 'raro', value: 45 },
            'pocao_stamina': { name: 'Poção de Vigor', type: 'potion', staminaRestore: 50, rarity: 'comum', value: 12 },
            'armadura_couro': { name: 'Armadura de Couro', type: 'armor', defense: 3, rarity: 'comum', value: 40 },
            'armadura_ferro': { name: 'Armadura de Ferro', type: 'armor', defense: 6, rarity: 'raro', value: 120 },
            'amuleto_cinzas': { name: 'Amuleto das Cinzas', type: 'accessory', luck: 3, rarity: 'épico', value: 200 },
            'essencia_fogo': { name: 'Essência de Fogo', type: 'crafting', rarity: 'raro', value: 50 },
            'essencia_gelo': { name: 'Essência de Gelo', type: 'crafting', rarity: 'raro', value: 50 },
            'ferro_bruto': { name: 'Ferro Bruto', type: 'crafting', rarity: 'comum', value: 10 },
            'couro': { name: 'Couro', type: 'crafting', rarity: 'comum', value: 8 },
        };

        const CraftingRecipes = [
            { result: 'pocao_vida_grande', materials: ['pocao_vida', 'pocao_vida', 'essencia_fogo'], description: 'Poção de Vida Grande' },
            { result: 'armadura_ferro', materials: ['armadura_couro', 'ferro_bruto', 'ferro_bruto'], description: 'Armadura de Ferro' },
            { result: 'lamina_sombria', materials: ['espada_longa', 'essencia_fogo', 'essencia_gelo'], description: 'Lâmina Sombria' },
        ];

        // Estado Global
        const GameState = {
            playerLevel: 1, playerXP: 0, xpToNext: 100, skillPoints: 0,
            playerStats: { strength: 5, defense: 3, agility: 4, mana: 10, luck: 2 },
            playerHP: 5, playerMaxHP: 5, playerStamina: 100, playerMaxStamina: 100,
            gold: 50,
            inventory: [
                { id: 'espada_curta', quantity: 1 },
                { id: 'pocao_vida', quantity: 3 },
                { id: 'couro', quantity: 2 }
            ],
            equipment: { weapon: 'espada_curta', armor: null, accessory: null },
            reputation: { arthon: 10, korag: 0, eldryn: 0, north: 0, stormIsle: 0 },
            quests: { main: { id: 'main_01', step: 0, title: 'O Despertar das Cinzas', completed: false }, side: [] },
            completedQuests: [],
            choices: { sparedVillage: null, executedKing: false, usedForbiddenMagic: false, freedDragons: false },
            currentRegion: 'arthon', gameTime: 0, dragonsDiscovered: 0, bossesDefeated: [], ending: null,
            discoveredRecipes: ['pocao_vida_grande'], lastSaveTime: null, dragonRiding: false
        };

        function getEquippedWeaponDamage() {
            const wpnId = GameState.equipment.weapon;
            return wpnId && ItemDatabase[wpnId] ? ItemDatabase[wpnId].damage || 3 : 3;
        }
        function getEquippedArmorDefense() {
            const armId = GameState.equipment.armor;
            return armId && ItemDatabase[armId] ? ItemDatabase[armId].defense || 0 : 0;
        }
        function getTotalStat(statName) {
            let total = GameState.playerStats[statName] || 0;
            ['weapon', 'armor', 'accessory'].forEach(slot => {
                const id = GameState.equipment[slot];
                if (id && ItemDatabase[id] && ItemDatabase[id][statName]) total += ItemDatabase[id][statName];
            });
            return total;
        }
        function addToInventory(itemId, qty = 1) {
            const existing = GameState.inventory.find(i => i.id === itemId);
            if (existing) existing.quantity += qty;
            else GameState.inventory.push({ id: itemId, quantity: qty });
        }
        function removeFromInventory(itemId, qty = 1) {
            const existing = GameState.inventory.find(i => i.id === itemId);
            if (!existing) return false;
            existing.quantity -= qty;
            if (existing.quantity <= 0) GameState.inventory = GameState.inventory.filter(i => i.id !== itemId);
            return true;
        }
        function countInInventory(itemId) {
            const existing = GameState.inventory.find(i => i.id === itemId);
            return existing ? existing.quantity : 0;
        }
        function saveGame() {
            GameState.lastSaveTime = Date.now();
            localStorage.setItem('reino_das_cinzas_save', JSON.stringify(GameState));
            return true;
        }
        function loadGame() {
            const saved = localStorage.getItem('reino_das_cinzas_save');
            if (saved) { try { Object.assign(GameState, JSON.parse(saved)); return true; } catch (e) { return false; } }
            return false;
        }

        // ==================== BOOT SCENE ====================
        class BootScene extends Phaser.Scene {
            constructor() { super('BootScene'); }
            preload() {
                // Texturas base
                const canvas = this.textures.createCanvas('player_down', 32, 32);
                const ctx = canvas.getContext();
                ctx.fillStyle = '#3a3a3a'; ctx.fillRect(10, 6, 12, 18);
                ctx.fillStyle = '#1a1a1a'; ctx.fillRect(8, 24, 16, 8);
                ctx.fillStyle = '#6b3a2a'; ctx.fillRect(12, 2, 8, 6);
                ctx.fillStyle = '#c9a84c'; ctx.fillRect(10, 8, 4, 4);
                canvas.refresh();

                const heartCanvas = this.textures.createCanvas('heart_full', 16, 16);
                const hc = heartCanvas.getContext();
                hc.fillStyle = '#cc0000'; hc.fillRect(4, 3, 8, 10);
                heartCanvas.refresh();

                const partCanvas = this.textures.createCanvas('particle', 4, 4);
                const pc = partCanvas.getContext();
                pc.fillStyle = '#ffffff'; pc.fillRect(0, 0, 4, 4);
                partCanvas.refresh();

                const enemyCanvas = this.textures.createCanvas('enemy', 32, 32);
                const ec = enemyCanvas.getContext();
                ec.fillStyle = '#1a1a2e'; ec.fillRect(8, 4, 16, 20);
                ec.fillStyle = '#4a0000'; ec.fillRect(12, 0, 8, 6);
                ec.fillStyle = '#ff0000'; ec.fillRect(14, 2, 3, 2);
                enemyCanvas.refresh();
            }
            create() {
                loadGame();
                this.cameras.main.fadeIn(500);
                this.time.delayedCall(500, () => this.scene.start('MenuScene'));
            }
        }

        // ==================== MENU SCENE ====================
        class MenuScene extends Phaser.Scene {
            constructor() { super('MenuScene'); }
            create() {
                const { width, height } = this.cameras.main;
                this.cameras.main.setBackgroundColor('#0a0a0a');
                this.add.text(width / 2, height / 2 - 80, 'REINO\nDAS\nCINZAS', {
                    fontSize: '48px', color: '#c9a84c', stroke: '#000', strokeThickness: 8, align: 'center', lineSpacing: 6
                }).setOrigin(0.5);
                this.add.text(width / 2, height / 2 + 20, 'O Herdeiro das Cinzas', {
                    fontSize: '18px', color: '#8b0000', stroke: '#000', strokeThickness: 4
                }).setOrigin(0.5);
                const startBtn = this.add.text(width / 2, height / 2 + 100, '⚔️ INICIAR JORNADA', {
                    fontSize: '24px', color: '#d4c48a', stroke: '#000', strokeThickness: 6, padding: { x: 20, y: 10 }
                }).setOrigin(0.5).setInteractive({ useHandCursor: true });
                startBtn.on('pointerover', () => startBtn.setColor('#ffffff'));
                startBtn.on('pointerout', () => startBtn.setColor('#d4c48a'));
                startBtn.on('pointerdown', () => {
                    this.cameras.main.fadeOut(500);
                    this.time.delayedCall(500, () => this.scene.start('GameScene'));
                });
            }
        }

        // ==================== GAME SCENE (completa) ====================
        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }
            create() {
                const { width, height } = this.cameras.main;
                this.cameras.main.setBackgroundColor('#1a1a2e');
                this.cameras.main.fadeIn(500);

                // Mundo (mapa procedural simplificado)
                this.mapWidth = 2000;
                this.mapHeight = 2000;
                this.physics.world.setBounds(0, 0, this.mapWidth, this.mapHeight);

                // Jogador
                this.player = this.physics.add.sprite(400, 500, 'player_down');
                this.player.setCollideWorldBounds(true).setSize(20, 28).setDepth(10);
                this.player.hp = GameState.playerHP;
                this.player.maxHp = GameState.playerMaxHP;
                this.player.stamina = GameState.playerStamina;
                this.player.maxStamina = GameState.playerMaxStamina;
                this.player.attackCooldown = 0;
                this.player.alive = true;

                // Grupos
                this.enemies = this.physics.add.group();
                this.drops = this.physics.add.group();

                // Spawn de elementos
                this.spawnEnemy(600, 400, { hp: 3, dropTable: ['ferro_bruto', 'couro'] });
                this.spawnEnemy(800, 600, { hp: 5, dropTable: ['essencia_fogo'] });

                // Colisões
                this.physics.add.overlap(this.player, this.enemies, this.onHitEnemy, null, this);
                this.physics.add.overlap(this.player, this.drops, this.onCollectDrop, null, this);

                // HUD
                this.hearts = [];
                for (let i = 0; i < this.player.maxHp; i++) {
                    const heart = this.add.image(20 + i * 20, 20, 'heart_full').setScrollFactor(0).setDepth(100);
                    this.hearts.push(heart);
                }

                // Minimapa
                this.minimapGraphics = this.add.graphics().setScrollFactor(0).setDepth(150);

                // Controles mobile
                this.joystickActive = false;
                this.mobileDirection = { x: 0, y: 0 };
                this.moveSpeed = 2.2;
                this.joystickBase = this.add.circle(80, height - 140, 40, 0x000000, 0.3).setScrollFactor(0).setDepth(200).setInteractive();
                this.joystickThumb = this.add.circle(80, height - 140, 20, 0xffffff, 0.4).setScrollFactor(0).setDepth(201);
                this.joystickBase.on('pointerdown', (pointer) => {
                    this.joystickActive = true;
                    this.joystickStart = { x: pointer.x, y: pointer.y };
                });
                this.input.on('pointermove', (pointer) => {
                    if (!this.joystickActive) return;
                    const dx = pointer.x - this.joystickStart.x;
                    const dy = pointer.y - this.joystickStart.y;
                    const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 35);
                    const angle = Math.atan2(dy, dx);
                    const tx = this.joystickStart.x + Math.cos(angle) * dist;
                    const ty = this.joystickStart.y + Math.sin(angle) * dist;
                    this.joystickThumb.setPosition(tx, ty);
                    this.mobileDirection = { x: Math.cos(angle) * (dist / 35), y: Math.sin(angle) * (dist / 35) };
                });
                this.input.on('pointerup', () => {
                    this.joystickActive = false;
                    this.joystickThumb.setPosition(80, height - 140);
                    this.mobileDirection = { x: 0, y: 0 };
                });

                // Botões
                const btnStyle = { fontSize: '28px', backgroundColor: 'rgba(0,0,0,0.5)', padding: { x: 10, y: 6 } };
                this.atkBtn = this.add.text(width - 70, height - 180, '⚔️', btnStyle).setOrigin(0.5).setScrollFactor(0).setDepth(200).setInteractive();
                this.atkBtn.on('pointerdown', () => this.playerAttack());

                this.interactBtn = this.add.text(width - 70, height - 110, '👆', btnStyle).setOrigin(0.5).setScrollFactor(0).setDepth(200).setInteractive();
                this.interactBtn.on('pointerdown', () => this.interact());

                this.invBtn = this.add.text(width - 130, height - 110, '🎒', btnStyle).setOrigin(0.5).setScrollFactor(0).setDepth(200).setInteractive();
                this.invBtn.on('pointerdown', () => this.scene.launch('InventoryScene'));

                this.questBtn = this.add.text(width - 130, height - 180, '📜', btnStyle).setOrigin(0.5).setScrollFactor(0).setDepth(200).setInteractive();
                this.questBtn.on('pointerdown', () => this.scene.launch('QuestLogScene'));
            }

            spawnEnemy(x, y, config = {}) {
                const enemy = this.physics.add.sprite(x, y, 'enemy');
                enemy.hp = config.hp || 3;
                enemy.maxHp = config.hp || 3;
                enemy.damage = 1;
                enemy.aggroRange = 150;
                enemy.speed = 40;
                enemy.attackCooldown = 0;
                enemy.dropTable = config.dropTable || [];
                enemy.healthBar = this.add.graphics().setDepth(11);
                this.enemies.add(enemy);
            }

            onHitEnemy(player, enemy) {
                if (player.invulnerable || !player.alive) return;
                if (enemy.attackCooldown > 0) return;
                enemy.attackCooldown = 40;
                player.hp--;
                player.invulnerable = true;
                player.setTintFill(0xff0000);
                this.time.delayedCall(500, () => { player.invulnerable = false; player.clearTint(); });
                if (player.hp <= 0) this.playerDeath();
            }

            onCollectDrop(player, drop) {
                const itemId = drop.dropItemId;
                if (itemId === 'gold') {
                    GameState.gold += Phaser.Math.Between(10, 30);
                    this.showFloatingText('+' + GameState.gold + ' ouro', '#ffcc00');
                } else {
                    addToInventory(itemId, 1);
                    this.showFloatingText('+' + (ItemDatabase[itemId]?.name || itemId), '#44ff44');
                }
                drop.destroy();
            }

            playerAttack() {
                if (this.player.attackCooldown > 0) return;
                this.player.attackCooldown = 20;
                const slash = this.add.circle(this.player.x, this.player.y - 20, 18, 0xffcc00, 0.7).setDepth(50);
                this.tweens.add({ targets: slash, alpha: 0, scale: 1.5, duration: 200, onComplete: () => slash.destroy() });
                this.enemies.getChildren().forEach(enemy => {
                    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                    if (dist < 35) {
                        enemy.hp -= getEquippedWeaponDamage() + GameState.playerStats.strength;
                        if (enemy.hp <= 0) this.killEnemy(enemy);
                    }
                });
            }

            killEnemy(enemy) {
                if (Math.random() < 0.5 && enemy.dropTable.length > 0) {
                    const itemId = enemy.dropTable[Math.floor(Math.random() * enemy.dropTable.length)];
                    const drop = this.physics.add.sprite(enemy.x, enemy.y, 'particle').setDepth(5);
                    drop.dropItemId = itemId;
                    this.drops.add(drop);
                } else if (Math.random() < 0.7) {
                    const drop = this.physics.add.sprite(enemy.x, enemy.y, 'particle').setDepth(5);
                    drop.dropItemId = 'gold';
                    this.drops.add(drop);
                }
                GameState.playerXP += 30;
                if (GameState.playerXP >= GameState.xpToNext) this.levelUp();
                enemy.destroy();
            }

            levelUp() {
                GameState.playerLevel++;
                GameState.playerXP -= GameState.xpToNext;
                GameState.xpToNext = Math.floor(GameState.xpToNext * 1.5);
                GameState.playerMaxHP++;
                GameState.playerHP = GameState.playerMaxHP;
                GameState.playerMaxStamina += 10;
                GameState.playerStamina = GameState.playerMaxStamina;
                GameState.skillPoints += 2;
                this.showFloatingText('⬆ LEVEL UP! ⬆', '#ffcc00');
            }

            playerDeath() {
                this.player.alive = false;
                this.player.setTintFill(0x333333);
                this.time.delayedCall(1000, () => {
                    this.player.setPosition(400, 500);
                    this.player.hp = Math.ceil(this.player.maxHp / 2);
                    this.player.alive = true;
                    this.player.clearTint();
                });
            }

            interact() {
                this.showFloatingText('Interagindo...', '#ffcc00');
            }

            showFloatingText(text, color) {
                const txt = this.add.text(this.player.x, this.player.y - 30, text, {
                    fontSize: '18px', color: color, stroke: '#000', strokeThickness: 4
                }).setOrigin(0.5).setDepth(300);
                this.tweens.add({ targets: txt, y: txt.y - 30, alpha: 0, duration: 1000, onComplete: () => txt.destroy() });
            }

            update() {
                if (this.joystickActive) {
                    const threshold = 0.15;
                    let mx = this.mobileDirection.x, my = this.mobileDirection.y;
                    if (Math.abs(mx) < threshold) mx = 0;
                    if (Math.abs(my) < threshold) my = 0;
                    this.player.x += mx * this.moveSpeed;
                    this.player.y += my * this.moveSpeed;
                }
                this.enemies.getChildren().forEach(enemy => {
                    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                    if (dist < enemy.aggroRange && dist > 30) {
                        const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, this.player.x, this.player.y);
                        enemy.x += Math.cos(angle) * enemy.speed * 0.03;
                        enemy.y += Math.sin(angle) * enemy.speed * 0.03;
                    }
                    if (enemy.attackCooldown > 0) enemy.attackCooldown--;
                });
                if (this.player.attackCooldown > 0) this.player.attackCooldown--;
                this.hearts.forEach((heart, i) => {
                    heart.setTexture(i < this.player.hp ? 'heart_full' : 'heart_empty');
                });
            }
        }

        // ==================== CENAS EXTRAS (inventário, quests, etc) ====================
        class InventoryScene extends Phaser.Scene {
            constructor() { super('InventoryScene'); }
            create() {
                const { width, height } = this.cameras.main;
                this.add.rectangle(width / 2, height / 2, width, height, 0x000000, 0.8);
                this.add.text(width / 2, 30, '🎒 INVENTÁRIO', { fontSize: '24px', color: '#c9a84c' }).setOrigin(0.5);
                let y = 80;
                GameState.inventory.forEach(item => {
                    const data = ItemDatabase[item.id];
                    this.add.text(30, y, `${data?.name || item.id} x${item.quantity}`, { fontSize: '14px', color: '#ffffff' });
                    if (data?.type === 'weapon' && GameState.equipment.weapon !== item.id) {
                        const equipBtn = this.add.text(350, y, 'Equipar', { fontSize: '12px', color: '#ffcc00', backgroundColor: '#333' }).setInteractive();
                        equipBtn.on('pointerdown', () => {
                            GameState.equipment.weapon = item.id;
                            this.scene.stop();
                        });
                    } else if (data?.type === 'potion') {
                        const useBtn = this.add.text(350, y, 'Usar', { fontSize: '12px', color: '#44ff44', backgroundColor: '#333' }).setInteractive();
                        useBtn.on('pointerdown', () => {
                            if (data.heal) {
                                const gs = this.scene.get('GameScene');
                                gs.player.hp = Math.min(gs.player.hp + data.heal, gs.player.maxHp);
                            }
                            removeFromInventory(item.id, 1);
                            this.scene.restart();
                        });
                    }
                    y += 30;
                });
                const closeBtn = this.add.text(width / 2, height - 40, 'Fechar', { fontSize: '18px', color: '#ff4444' }).setOrigin(0.5).setInteractive();
                closeBtn.on('pointerdown', () => this.scene.stop());
            }
        }

        class QuestLogScene extends Phaser.Scene {
            constructor() { super('QuestLogScene'); }
            create() {
                const { width, height } = this.cameras.main;
                this.add.rectangle(width / 2, height / 2, width, height, 0x000000, 0.8);
                this.add.text(width / 2, 30, '📜 MISSÕES', { fontSize: '24px', color: '#c9a84c' }).setOrigin(0.5);
                this.add.text(30, 80, `Principal: ${GameState.quests.main.title} (Etapa ${GameState.quests.main.step})`, { fontSize: '14px', color: '#ffffff' });
                this.add.text(30, 120, `Reputação: Arthon ${GameState.reputation.arthon}`, { fontSize: '14px', color: '#cccccc' });
                const closeBtn = this.add.text(width / 2, height - 40, 'Fechar', { fontSize: '18px', color: '#ff4444' }).setOrigin(0.5).setInteractive();
                closeBtn.on('pointerdown', () => this.scene.stop());
            }
        }

        // ==================== CONFIGURAÇÃO FINAL ====================
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: GAME_WIDTH,
            height: GAME_HEIGHT,
            pixelArt: true,
            roundPixels: true,
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: GAME_WIDTH, height: GAME_HEIGHT },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
            scene: [BootScene, MenuScene, GameScene, InventoryScene, QuestLogScene],
            backgroundColor: '#0a0a0a'
        };
        const game = new Phaser.Game(config);
    </script>
</body>
</html>
