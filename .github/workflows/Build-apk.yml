name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Preparar pasta www
        run: |
          mkdir -p www
          cp index.html www/

      - name: Instalar dependências
        run: npm install

      - name: Instalar Capacitor CLI globalmente
        run: npm install -g @capacitor/cli

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permissão ao Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK Debug
        run: cd android && ./gradlew assembleDebug

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: ReinoDasCinzas-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk